/* =========================================================
   LEARN — lesson path, exercise engine, SRS review, streak
   (COURSE is injected above)
   ========================================================= */
const LESSONS_PER_UNIT=3;
const IVL_DAYS=[1,3,7,14,30,60,120];
const LKEY='sumi_learn_v1';
let LSTATE=Store.get(LKEY,{done:{},xp:0,days:{},srs:{}});
function saveL(){ Store.set(LKEY,LSTATE); }

// item index: id -> {type:'v'|'s', unit, obj}
const ITEMS={};
COURSE.forEach(u=>{
  u.vocab.forEach(v=>ITEMS[v.i]={type:'v',u,obj:v});
  u.sents.forEach(s=>ITEMS[s.i]={type:'s',u,obj:s});
});

function todayStr(d){ d=d||new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function addDaysStr(n){ const d=new Date(); d.setDate(d.getDate()+n); return todayStr(d); }
function streakCount(){
  const days=LSTATE.days; let n=0; const d=new Date();
  if(!days[todayStr(d)]) d.setDate(d.getDate()-1);           // grace: count up to yesterday
  while(days[todayStr(d)]){ n++; d.setDate(d.getDate()-1); }
  return n;
}
function lessonsDone(){ let n=0; for(const k in LSTATE.done) n+=LSTATE.done[k]; return n; }
function unitUnlocked(idx){ return true; } // all units open — progress may not persist across cleared storage
function dueItems(){
  const t=todayStr(); const out=[];
  for(const id in LSTATE.srs){ if(LSTATE.srs[id].due<=t && ITEMS[id]) out.push(id); }
  return out;
}

/* ---------------- learn stats strip ---------------- */
function renderLearnStats(){
  const total=COURSE.length*LESSONS_PER_UNIT;
  const due=dueItems().length;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="n">${streakCount()}<span class="unit">🔥</span></div><div class="l">Day streak</div></div>
    <div class="stat"><div class="n">${LSTATE.xp}<span class="unit">xp</span></div><div class="l">Total ink</div></div>
    <div class="stat"><div class="n">${lessonsDone()}<span class="unit">/${total}</span></div><div class="l">Lessons</div></div>
    <div class="stat"><div class="n">${due}</div><div class="l">Review due</div></div>`;
}

/* ---------------- path ---------------- */
function renderLearnHome(){
  const path=document.getElementById('learnPath'), stage=document.getElementById('learnStage');
  stage.style.display='none'; stage.innerHTML=''; path.style.display='';
  const due=dueItems().length;
  let html=`<div class="unitcard review ${due?'':'zzz'}">
    <div class="useal">復</div>
    <div class="umain"><div class="utitle">Review</div>
    <div class="usub">${due?due+' item'+(due>1?'s':'')+' ready — keep old ink fresh':'Nothing due — come back tomorrow'}</div></div>
    ${due?'<button class="btn primary ubtn" data-review="1">Review</button>':''}
  </div>`;
  COURSE.forEach((u,idx)=>{
    const d=LSTATE.done[u.id]||0;
    const unlocked=unitUnlocked(idx);
    const full=d>=LESSONS_PER_UNIT;
    let dots='';
    for(let li=0;li<LESSONS_PER_UNIT;li++){
      const can=true;
      dots+=`<button class="ldot ${li<d?'done':''}" data-u="${idx}" data-li="${li}" ${can?'':'disabled'} aria-label="Lesson ${li+1}${li<d?' (done)':''}">${li<d?'✓':li+1}</button>`;
    }
    html+=`<div class="unitcard ${unlocked?'':'locked'} ${full?'full':''}">
      <div class="useal">${full?'済':idx+1}</div>
      <div class="umain">
        <div class="utitle">${u.title} <span class="ujp">${u.jp}</span></div>
        <div class="udots">${dots}</div>
      </div>
      <button class="tipbtn" data-tip="${idx}" aria-label="Grammar tip">?</button>
      ${unlocked?'':'<span class="lock">🔒</span>'}
    </div>`;
  });
  html+=`<div class="path-end">The path grows with you — finish it, then tell me and we’ll add the next stage. 頑張って!</div>`;
  path.innerHTML=html;
  path.querySelectorAll('.ldot:not([disabled])').forEach(b=>b.addEventListener('click',()=>startLesson(+b.dataset.u,+b.dataset.li)));
  path.querySelectorAll('.tipbtn').forEach(b=>b.addEventListener('click',()=>{
    const u=COURSE[+b.dataset.tip];
    showDrawer(`<div class="big" style="font-size:44px">${u.jp}</div>
      <div class="k-mean">${u.title}</div>
      <div class="note" style="margin-top:14px">${u.tip}</div>`);
  }));
  const rb=path.querySelector('[data-review]'); if(rb) rb.addEventListener('click',startReview);
}

/* ---------------- exercise generation ---------------- */
function pickN(arr,n){ return shuffle(arr).slice(0,n); }
function exMCV(v,dir,unit){
  const pool=pickN(unit.vocab.filter(x=>x.i!==v.i),3).concat([v]);
  return {k:'mcv',dir,v,opts:shuffle(pool),item:v.i};
}
function exMCS(s,unit){
  const pool=pickN(unit.sents.filter(x=>x.i!==s.i),3).concat([s]);
  return {k:'mcs',s,opts:shuffle(pool),item:s.i};
}
function jpDistractors(unit,tokens,n){
  let pool=[];
  COURSE.forEach(u=>u.sents.forEach(s=>pool.push(...s.t)));
  pool=[...new Set(pool)].filter(t=>!tokens.includes(t));
  return pickN(pool,n);
}
function enWords(en){ return en.replace(/[.,?!—;:"“”]/g,'').split(/\s+/).filter(Boolean); }
function enDistractors(tokens,n){
  let pool=[];
  const lower=tokens.map(t=>t.toLowerCase());
  COURSE.forEach(u=>u.sents.forEach(s=>pool.push(...enWords(s.en))));
  pool=[...new Set(pool)].filter(t=>!lower.includes(t.toLowerCase()));
  return pickN(pool,n);
}
function exBuildJ(s,unit,listen){
  const bank=shuffle(s.t.concat(jpDistractors(unit,s.t,Math.min(3,Math.max(2,8-s.t.length)))));
  return {k:listen?'listen':'buildj',s,bank,item:s.i};
}
function exBuildE(s){
  const ans=enWords(s.en);
  const bank=shuffle(ans.concat(enDistractors(ans,Math.min(3,Math.max(2,9-ans.length)))));
  return {k:'builde',s,ans,bank,item:s.i};
}
function exMatch(unit){
  const vs=pickN(unit.vocab,4);
  return {k:'match',pairs:vs,item:null};
}
function genLesson(u,li){
  const q=[];
  if(li===0) q.push({k:'tip',u});
  const vs=pickN(u.vocab,4);
  q.push(exMCV(vs[0],'j2e',u));
  q.push(exMCV(vs[1],'e2j',u));
  q.push(exMatch(u));
  const ss=pickN(u.sents,Math.min(6,u.sents.length));
  q.push(exBuildJ(ss[0],u,false));
  q.push(exMCS(ss[1],u));
  q.push(exBuildE(ss[2]));
  q.push(exBuildJ(ss[3],u,false));
  if(ss[4]) q.push(jaVoice? exBuildJ(ss[4],u,true) : exMCS(ss[4],u));
  if(li>0 && ss[5]) q.push(exBuildE(ss[5]));
  return q;
}
function genReview(ids){
  return ids.map(id=>{
    const it=ITEMS[id];
    if(it.type==='v') return exMCV(it.obj, Math.random()<0.5?'j2e':'e2j', it.u);
    return Math.random()<0.6? exBuildJ(it.obj,it.u,false) : exMCS(it.obj,it.u);
  });
}

/* ---------------- lesson runtime ---------------- */
let L=null;
const PRAISE=['すごい! Nice.','いいね! Good one.','完璧! Perfect.','正解! Correct.','その調子! Keep it up.'];
function startLesson(uIdx,li){ L={queue:genLesson(COURSE[uIdx],li),i:0,u:COURSE[uIdx],li,mistakes:0,firstTry:{},requeued:{},isReview:false}; runEx(); }
function startReview(){
  const ids=pickN(dueItems(),10);
  if(!ids.length) return;
  L={queue:genReview(ids),i:0,u:null,li:0,mistakes:0,firstTry:{},requeued:{},isReview:true};
  runEx();
}
function lsnShell(inner,progress){
  return `<div class="lsn-top">
      <button class="lsn-x" id="lsnX" aria-label="Quit lesson">×</button>
      <div class="pbar lsn-pbar"><i style="width:${progress}%"></i></div>
    </div>${inner}`;
}
function runEx(){
  const path=document.getElementById('learnPath'), stage=document.getElementById('learnStage');
  path.style.display='none'; stage.style.display='';
  if(L.i>=L.queue.length){ return endLesson(); }
  const ex=L.queue[L.i];
  const prog=Math.round(L.i/L.queue.length*100);
  let inner='';
  if(ex.k==='tip'){
    inner=`<div class="lsn-body"><div class="lsn-label">New ink · ${ex.u.title}</div>
      <div class="tipcard"><div class="tipjp">${ex.u.jp}</div>${ex.u.tip}</div></div>
      <div class="lsn-foot"><button class="btn primary wide" id="lsnMain">Start →</button></div>`;
  }
  else if(ex.k==='mcv'){
    const q=ex.dir==='j2e'?ex.v.jp:ex.v.en;
    const lbl=ex.dir==='j2e'?'What does this mean?':'Pick the Japanese';
    inner=`<div class="lsn-body"><div class="lsn-label">${lbl}</div>
      <div class="lsn-q ${ex.dir==='j2e'?'jpq':''}">${q}${ex.dir==='j2e'&&speakAvail()?' <button class="spk" data-say="'+ex.v.jp+'">🔊</button>':''}</div>
      <div class="choices lsn-choices">${ex.opts.map((o,i)=>`<button class="choice ${ex.dir==='e2j'?'':'roman'}" data-i="${i}">${ex.dir==='j2e'?o.en:o.jp}</button>`).join('')}</div></div>
      <div class="lsn-foot"><button class="btn primary wide" id="lsnMain" disabled>Check</button></div>`;
  }
  else if(ex.k==='mcs'){
    inner=`<div class="lsn-body"><div class="lsn-label">What does this sentence mean?</div>
      <div class="lsn-q jpq sent">${ex.s.t.join(' ')}${speakAvail()?' <button class="spk" data-say="'+ex.s.t.join('')+'">🔊</button>':''}</div>
      <div class="lsn-ro">${ex.s.ro}</div>
      <div class="choices lsn-choices">${ex.opts.map((o,i)=>`<button class="choice roman" data-i="${i}">${o.en}</button>`).join('')}</div></div>
      <div class="lsn-foot"><button class="btn primary wide" id="lsnMain" disabled>Check</button></div>`;
  }
  else if(ex.k==='buildj'||ex.k==='listen'){
    const prompt = ex.k==='listen'
      ? `<div class="lsn-q listenq"><button class="bigspk" data-say="${ex.s.t.join('')}">🔊</button><button class="bigspk slow" data-say="${ex.s.t.join('')}" data-slow="1">🐢</button></div>`
      : `<div class="lsn-q enq">${ex.s.en}</div>`;
    inner=`<div class="lsn-body"><div class="lsn-label">${ex.k==='listen'?'Tap what you hear':'Build it in Japanese'}</div>
      ${prompt}
      <div class="built" id="built"></div>
      <div class="bank" id="bank">${ex.bank.map((t,i)=>`<button class="chip" data-i="${i}" data-t="${t}">${t}</button>`).join('')}</div></div>
      <div class="lsn-foot"><button class="btn primary wide" id="lsnMain" disabled>Check</button></div>`;
  }
  else if(ex.k==='builde'){
    inner=`<div class="lsn-body"><div class="lsn-label">Build it in English</div>
      <div class="lsn-q jpq sent">${ex.s.t.join(' ')}${speakAvail()?' <button class="spk" data-say="'+ex.s.t.join('')+'">🔊</button>':''}</div>
      <div class="lsn-ro">${ex.s.ro}</div>
      <div class="built" id="built"></div>
      <div class="bank" id="bank">${ex.bank.map((t,i)=>`<button class="chip roman" data-i="${i}" data-t="${t}">${t}</button>`).join('')}</div></div>
      <div class="lsn-foot"><button class="btn primary wide" id="lsnMain" disabled>Check</button></div>`;
  }
  else if(ex.k==='match'){
    const left=shuffle(ex.pairs.map(p=>({t:p.jp,id:p.i})));
    const right=shuffle(ex.pairs.map(p=>({t:p.en,id:p.i})));
    inner=`<div class="lsn-body"><div class="lsn-label">Match the pairs</div>
      <div class="mgrid">
        <div class="mcol">${left.map(o=>`<button class="mopt jp" data-id="${o.id}" data-side="l">${o.t}</button>`).join('')}</div>
        <div class="mcol">${right.map(o=>`<button class="mopt roman" data-id="${o.id}" data-side="r">${o.t}</button>`).join('')}</div>
      </div></div>
      <div class="lsn-foot"><button class="btn primary wide" id="lsnMain" disabled>Continue</button></div>`;
  }
  document.getElementById('learnStage').innerHTML=lsnShell(inner,prog);
  wireEx(ex);
}
function wireEx(ex){
  const stage=document.getElementById('learnStage');
  stage.querySelectorAll('[data-say]').forEach(b=>b.addEventListener('click',()=>{
    const u=new SpeechSynthesisUtterance(b.dataset.say); u.lang='ja-JP'; if(jaVoice)u.voice=jaVoice;
    u.rate=b.dataset.slow?0.5:0.8; speechSynthesis.cancel(); speechSynthesis.speak(u);
  }));
  document.getElementById('lsnX').onclick=()=>{ if(confirm('Quit this lesson? Progress in it is lost.')) renderLearnHome(); };
  const main=document.getElementById('lsnMain');
  if(ex.k==='tip'){ main.onclick=()=>{ L.i++; runEx(); }; if(ex.u && speakAvail()) speak(ex.u.jp); return; }
  if(ex.k==='mcv'||ex.k==='mcs'){
    let sel=-1;
    stage.querySelectorAll('.choice').forEach(b=>b.addEventListener('click',()=>{
      if(main.dataset.checked) return;
      sel=+b.dataset.i;
      stage.querySelectorAll('.choice').forEach(x=>x.classList.toggle('picked',x===b));
      main.disabled=false;
    }));
    main.onclick=()=>{
      if(main.dataset.checked) return;
      const ok = ex.k==='mcv' ? ex.opts[sel].i===ex.v.i : ex.opts[sel].i===ex.s.i;
      stage.querySelectorAll('.choice').forEach(b=>{
        const idx=+b.dataset.i;
        const isAns = ex.k==='mcv'? ex.opts[idx].i===ex.v.i : ex.opts[idx].i===ex.s.i;
        b.disabled=true; if(isAns)b.classList.add('correct'); else if(idx===sel)b.classList.add('wrong');
      });
      finishEx(ex,ok);
    };
    if(ex.k==='listen'||(ex.k==='mcs'&&speakAvail())){} // no auto
  }
  if(ex.k==='buildj'||ex.k==='builde'||ex.k==='listen'){
    const built=document.getElementById('built'), bank=document.getElementById('bank');
    function sync(){ main.disabled=!built.children.length; }
    bank.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{
      if(main.dataset.checked||c.classList.contains('used')) return;
      c.classList.add('used');
      const b=document.createElement('button');
      b.className='chip built-chip'+(ex.k==='builde'?' roman':''); b.textContent=c.dataset.t; b.dataset.src=c.dataset.i;
      b.addEventListener('click',()=>{ if(main.dataset.checked)return; c.classList.remove('used'); b.remove(); sync(); });
      built.appendChild(b); sync();
    }));
    main.onclick=()=>{
      if(main.dataset.checked) return;
      const got=[...built.children].map(b=>b.textContent);
      const want = ex.k==='builde'? ex.ans : ex.s.t;
      const ok = got.length===want.length && got.every((t,i)=>t===want[i]);
      finishEx(ex,ok);
    };
    if(ex.k==='listen'){ const bs=stage.querySelector('.bigspk'); if(bs) bs.click(); }
  }
  if(ex.k==='match'){
    let pick=null, matched=0, wrongs=0;
    stage.querySelectorAll('.mopt').forEach(b=>b.addEventListener('click',()=>{
      if(b.classList.contains('done')) return;
      if(!pick){ pick=b; b.classList.add('picked'); return; }
      if(pick===b){ b.classList.remove('picked'); pick=null; return; }
      if(pick.dataset.side===b.dataset.side){ pick.classList.remove('picked'); pick=b; b.classList.add('picked'); return; }
      if(pick.dataset.id===b.dataset.id){
        pick.classList.remove('picked'); pick.classList.add('done'); b.classList.add('done');
        matched++; pick=null;
        if(matched===4){ main.disabled=false; main.onclick=()=>{ finishEx(ex,wrongs===0,true); }; }
      } else {
        wrongs++; b.classList.add('shake'); pick.classList.add('shake');
        const a=pick; setTimeout(()=>{a.classList.remove('shake','picked');b.classList.remove('shake');},350); pick=null;
      }
    }));
  }
}
function finishEx(ex,ok,silent){
  const main=document.getElementById('lsnMain');
  main.dataset.checked='1';
  if(ex.item && !(ex.item in L.firstTry)) L.firstTry[ex.item]=ok;
  if(!ok){
    L.mistakes++;
    if(ex.item && !L.requeued[ex.item]){ L.requeued[ex.item]=1; L.queue.push({...ex}); }
  }
  const ans = ex.k==='mcv' ? `${ex.v.jp} — ${ex.v.en}`
            : ex.k==='match' ? ''
            : `${ex.s.t.join(' ')} — ${ex.s.en}`;
  const sayTxt = ex.k==='mcv'? ex.v.jp : (ex.s? ex.s.t.join(''):'');
  const fb=document.createElement('div');
  fb.className='fbanner '+(ok?'good':'bad');
  fb.innerHTML=`<div class="fb-head">${ok? PRAISE[Math.floor(Math.random()*PRAISE.length)] : 'Not quite — correct answer:'}</div>
    ${ans?`<div class="fb-ans">${ans} ${sayTxt&&speakAvail()?`<button class="spk" data-say="${sayTxt}">🔊</button>`:''}</div>`:''}`;
  document.getElementById('learnStage').appendChild(fb);
  fb.querySelectorAll('[data-say]').forEach(b=>b.addEventListener('click',()=>speak(b.dataset.say)));
  main.textContent='Continue'; main.disabled=false;
  main.onclick=()=>{ L.i++; runEx(); };
  if(silent){ fb.remove(); L.i++; runEx(); }
}
function endLesson(){
  const stage=document.getElementById('learnStage');
  const perfect=L.mistakes===0;
  const xp=L.isReview? 10 : 10+(perfect?5:0);
  // record progress
  const t=todayStr();
  LSTATE.xp+=xp; LSTATE.days[t]=(LSTATE.days[t]||0)+xp;
  if(L.isReview){
    for(const id in L.firstTry){
      const e=LSTATE.srs[id]||{ivl:0};
      if(L.firstTry[id]) e.ivl=Math.min(e.ivl+1,IVL_DAYS.length-1); else e.ivl=0;
      e.due=addDaysStr(IVL_DAYS[e.ivl]);
      LSTATE.srs[id]=e;
    }
  } else {
    const d=LSTATE.done[L.u.id]||0;
    if(L.li>=d) LSTATE.done[L.u.id]=L.li+1;
    for(const id in L.firstTry){
      if(!LSTATE.srs[id]) LSTATE.srs[id]={ivl:0,due:addDaysStr(1)};
    }
  }
  saveL(); renderLearnStats();
  const acc = Object.keys(L.firstTry).length? Math.round(Object.values(L.firstTry).filter(Boolean).length/Object.keys(L.firstTry).length*100):100;
  stage.innerHTML=`<div class="lsn-end">
      <div class="end-seal">${perfect?'完璧':'済'}</div>
      <div class="end-title">${L.isReview?'Review done!':'Lesson complete!'}</div>
      <div class="end-stats">
        <div class="estat"><b>+${xp}</b><span>ink (XP)</span></div>
        <div class="estat"><b>${acc}%</b><span>first-try</span></div>
        <div class="estat"><b>${streakCount()}🔥</b><span>day streak</span></div>
      </div>
      ${perfect&&!L.isReview?'<div class="end-note">Flawless — bonus ink earned.</div>':''}
      <button class="btn primary wide" id="endBtn">Continue</button>
    </div>`;
  document.getElementById('endBtn').onclick=renderLearnHome;
}

// init
setMode('learn');
if(!Store.persistent){
  // gentle, non-blocking note in footer if storage unavailable
  const f=document.querySelector('footer span');
  f.textContent='Heads up: storage is blocked here, so progress won’t persist. It will once deployed.';
}
