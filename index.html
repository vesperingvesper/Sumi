<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sumi — Kana Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#ECE5D5;
    --paper-2:#E4DAC4;
    --paper-line:#D8CCB2;
    --sumi:#1C1B22;
    --sumi-soft:#4A4838;
    --ink:32,72,110;      /* ai indigo, used as rgb for alpha shading */
    --ink-deep:#16314D;
    --shu:#C2412A;        /* vermilion seal red */
    --shu-soft:#D4694F;
    --gold:#9A7B3F;
    --good:#4E6B4A;
    --serif:'Zen Old Mincho','Hiragino Mincho ProN','Yu Mincho',serif;
    --sans:'Zen Kaku Gothic New','Hiragino Sans','Yu Gothic',system-ui,sans-serif;
    --radius:3px;
    --shadow:0 1px 0 rgba(0,0,0,.04), 0 8px 24px -16px rgba(28,27,34,.35);
  }
  :root.night{
    --paper:#15171F;
    --paper-2:#1D202B;
    --paper-line:#2A2E3B;
    --sumi:#E9E3D4;
    --sumi-soft:#A9A48F;
    --ink:120,170,225;
    --ink-deep:#A9CDF2;
    --shu:#E0654A;
    --shu-soft:#E0654A;
    --gold:#C9A864;
    --good:#86B07E;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--paper);
    color:var(--sumi);
    font-family:var(--sans);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    background-image:
      radial-gradient(rgba(0,0,0,.012) 1px, transparent 1px),
      radial-gradient(rgba(0,0,0,.012) 1px, transparent 1px);
    background-size:7px 7px, 7px 7px;
    background-position:0 0, 3.5px 3.5px;
    min-height:100vh;
    transition:background-color .5s ease, color .5s ease;
  }
  .wrap{max-width:940px;margin:0 auto;padding:22px 18px 80px}

  /* ---------- Header ---------- */
  header.top{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:8px}
  .brand{display:flex;align-items:center;gap:13px}
  .seal{
    width:46px;height:46px;flex:none;display:grid;place-items:center;
    background:var(--shu);color:#F4ECDB;border-radius:5px;
    font-family:var(--serif);font-weight:900;font-size:26px;
    box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.18), 0 4px 14px -6px rgba(194,65,42,.7);
    transform:rotate(-2deg);
  }
  .brand h1{font-family:var(--serif);font-weight:700;font-size:25px;margin:0;letter-spacing:.5px}
  .brand p{margin:1px 0 0;font-size:12.5px;color:var(--sumi-soft);letter-spacing:.3px}
  .top-spacer{flex:1}
  .icon-btn{
    border:1px solid var(--paper-line);background:var(--paper-2);color:var(--sumi);
    border-radius:var(--radius);padding:8px 12px;font-family:var(--sans);font-size:13px;font-weight:500;
    cursor:pointer;transition:.18s;display:inline-flex;align-items:center;gap:6px;
  }
  .icon-btn:hover{border-color:var(--sumi-soft)}
  .icon-btn:focus-visible{outline:2px solid var(--shu);outline-offset:2px}

  /* ---------- Controls bar ---------- */
  .controls{
    display:flex;flex-wrap:wrap;gap:8px 14px;align-items:center;
    padding:12px 0 14px;border-bottom:1.5px solid var(--paper-line);margin-bottom:18px;
  }
  .seg{display:inline-flex;background:var(--paper-2);border:1px solid var(--paper-line);border-radius:var(--radius);overflow:hidden}
  .seg button{
    border:0;background:transparent;color:var(--sumi-soft);padding:7px 13px;cursor:pointer;
    font-family:var(--sans);font-size:13px;font-weight:500;transition:.15s;
  }
  .seg button.on{background:var(--sumi);color:var(--paper)}
  .seg button:not(.on):hover{color:var(--sumi)}
  .seg button:focus-visible{outline:2px solid var(--shu);outline-offset:-2px}
  .ctl-label{font-size:11.5px;text-transform:uppercase;letter-spacing:1.2px;color:var(--sumi-soft);margin-right:-6px}
  .check{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--sumi);cursor:pointer;user-select:none}
  .check input{accent-color:var(--shu);width:15px;height:15px}

  /* ---------- Tabs ---------- */
  nav.tabs{display:flex;gap:2px;margin-bottom:20px;flex-wrap:wrap}
  nav.tabs button{
    border:0;background:none;font-family:var(--sans);font-size:15px;font-weight:500;
    color:var(--sumi-soft);padding:7px 2px;margin-right:22px;cursor:pointer;position:relative;
    transition:color .15s;
  }
  nav.tabs button .jp{font-family:var(--serif);font-size:13px;opacity:.65;margin-left:5px}
  nav.tabs button:hover{color:var(--sumi)}
  nav.tabs button.on{color:var(--sumi)}
  nav.tabs button.on::after{
    content:"";position:absolute;left:0;right:0;bottom:-2px;height:2.5px;background:var(--shu);border-radius:2px;
  }
  nav.tabs button:focus-visible{outline:2px solid var(--shu);outline-offset:3px;border-radius:2px}

  /* ---------- Stats strip ---------- */
  .stats{display:flex;gap:26px;flex-wrap:wrap;margin-bottom:18px}
  .stat .n{font-family:var(--serif);font-size:26px;font-weight:700;line-height:1}
  .stat .l{font-size:11.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--sumi-soft);margin-top:3px}
  .stat .n .unit{font-size:14px;color:var(--sumi-soft);font-weight:500;margin-left:1px}

  /* ---------- Chart / grid ---------- */
  .grid-block{margin-bottom:26px}
  .grid-block h3{
    font-family:var(--serif);font-weight:500;font-size:14px;color:var(--sumi-soft);
    margin:0 0 9px;letter-spacing:2px;text-transform:uppercase;
    display:flex;align-items:center;gap:10px;
  }
  .grid-block h3::after{content:"";flex:1;height:1px;background:var(--paper-line)}
  .kgrid{display:grid;gap:6px}
  .kgrid.g5{grid-template-columns:repeat(5,1fr)}
  .kgrid.g3{grid-template-columns:repeat(3,1fr)}
  .cell{
    aspect-ratio:1/1;border:1px solid var(--paper-line);border-radius:var(--radius);
    background:var(--paper-2);display:flex;flex-direction:column;align-items:center;justify-content:center;
    cursor:pointer;position:relative;overflow:hidden;transition:background-color .5s ease, transform .12s, border-color .15s;
    padding:2px;
  }
  .cell.empty{visibility:hidden;cursor:default}
  .cell:hover{transform:translateY(-2px);border-color:var(--sumi-soft)}
  .cell:focus-visible{outline:2px solid var(--shu);outline-offset:2px}
  .cell .ch{font-family:var(--serif);font-size:clamp(22px,5.4vw,34px);line-height:1;font-weight:500;z-index:1}
  .cell .ro{font-size:11px;color:var(--sumi-soft);margin-top:3px;z-index:1;letter-spacing:.5px}
  .cell.lit .ch{color:#F4ECDB}
  .cell.lit .ro{color:rgba(244,236,219,.78)}
  .cell .dots{position:absolute;top:5px;right:5px;display:flex;gap:2px;z-index:1}
  .cell .dots i{width:4px;height:4px;border-radius:50%;background:var(--shu);display:block}
  .cell.lit .dots i{background:#F4ECDB}

  /* ---------- Detail drawer ---------- */
  .drawer-bg{position:fixed;inset:0;background:rgba(20,18,14,.34);opacity:0;pointer-events:none;transition:.25s;z-index:40}
  .drawer-bg.show{opacity:1;pointer-events:auto}
  .drawer{
    position:fixed;z-index:50;background:var(--paper);border:1px solid var(--paper-line);
    box-shadow:0 24px 60px -22px rgba(20,18,14,.6);
    right:18px;bottom:18px;width:330px;max-width:calc(100vw - 36px);
    border-radius:6px;padding:22px;transform:translateY(16px);opacity:0;pointer-events:none;transition:.25s;
  }
  .drawer.show{transform:none;opacity:1;pointer-events:auto}
  .drawer .big{font-family:var(--serif);font-size:84px;line-height:1;text-align:center;margin:4px 0 6px}
  .drawer .roline{text-align:center;font-size:20px;font-weight:700;letter-spacing:1px;margin-bottom:2px}
  .drawer .alt{text-align:center;font-size:12px;color:var(--sumi-soft);margin-bottom:14px}
  .drawer .note{font-size:13.5px;background:var(--paper-2);border-left:3px solid var(--gold);padding:10px 12px;border-radius:2px;margin-bottom:14px}
  .drawer .note b{color:var(--shu)}
  .drawer-row{display:flex;gap:10px;align-items:center;margin-bottom:14px}
  .speak-btn{flex:1;border:1px solid var(--paper-line);background:var(--paper-2);color:var(--sumi);border-radius:var(--radius);padding:10px;font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:.15s}
  .speak-btn:hover:not(:disabled){border-color:var(--shu);color:var(--shu)}
  .speak-btn:disabled{opacity:.45;cursor:not-allowed}
  .mastery-line{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--sumi-soft)}
  .mdots{display:flex;gap:4px}
  .mdots i{width:9px;height:9px;border-radius:50%;border:1.5px solid var(--shu)}
  .mdots i.f{background:var(--shu)}
  .drawer .close{position:absolute;top:12px;right:12px;border:0;background:none;font-size:20px;color:var(--sumi-soft);cursor:pointer;line-height:1}
  .drawer .close:hover{color:var(--sumi)}

  /* ---------- Study shared ---------- */
  .pane{display:none}
  .pane.on{display:block;animation:fade .35s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .empty-msg{text-align:center;padding:60px 20px;color:var(--sumi-soft);font-size:15px}
  .empty-msg .big{font-family:var(--serif);font-size:42px;color:var(--paper-line);margin-bottom:10px}

  /* progress bar */
  .pbar{height:4px;background:var(--paper-line);border-radius:2px;overflow:hidden;margin-bottom:22px}
  .pbar i{display:block;height:100%;background:var(--shu);width:0;transition:width .3s}
  .qcount{font-size:12.5px;color:var(--sumi-soft);text-align:center;margin-bottom:14px;letter-spacing:.5px}

  /* ---------- Flashcards ---------- */
  .card-stage{display:flex;flex-direction:column;align-items:center;gap:20px}
  .flip{width:280px;height:300px;perspective:1200px;cursor:pointer}
  .flip-inner{position:relative;width:100%;height:100%;transition:transform .5s cubic-bezier(.3,.8,.3,1.2);transform-style:preserve-3d}
  .flip.flipped .flip-inner{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;border:1px solid var(--paper-line);border-radius:8px;background:var(--paper-2);box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
  .face.back{transform:rotateY(180deg);background:var(--ink-deep);color:#F4ECDB;border-color:var(--ink-deep)}
  .face .glyph{font-family:var(--serif);font-size:130px;line-height:1}
  .face.back .glyph{font-size:62px;font-weight:700;letter-spacing:1px}
  .face .hint{font-size:12.5px;color:var(--sumi-soft)}
  .face.back .hint{color:rgba(244,236,219,.7)}
  .face .tag{position:absolute;top:12px;left:14px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--sumi-soft)}
  .face.back .tag{color:rgba(244,236,219,.55)}
  .card-actions{display:flex;gap:12px}
  .btn{border:1px solid var(--paper-line);background:var(--paper-2);color:var(--sumi);border-radius:var(--radius);padding:11px 22px;font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer;transition:.15s}
  .btn:hover{border-color:var(--sumi-soft)}
  .btn:focus-visible{outline:2px solid var(--shu);outline-offset:2px}
  .btn.good{border-color:var(--good);color:var(--good)}
  .btn.good:hover{background:var(--good);color:var(--paper)}
  .btn.again{border-color:var(--shu);color:var(--shu)}
  .btn.again:hover{background:var(--shu);color:var(--paper)}
  .btn.primary{background:var(--sumi);color:var(--paper);border-color:var(--sumi)}
  .btn.primary:hover{background:var(--ink-deep);border-color:var(--ink-deep)}
  .flip-tip{font-size:12px;color:var(--sumi-soft)}

  /* ---------- Quiz ---------- */
  .quiz-stage{max-width:480px;margin:0 auto}
  .prompt{
    background:var(--paper-2);border:1px solid var(--paper-line);border-radius:8px;
    padding:34px 20px;text-align:center;margin-bottom:18px;box-shadow:var(--shadow);
  }
  .prompt .label{font-size:11.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--sumi-soft);margin-bottom:8px}
  .prompt .q{font-family:var(--serif);font-size:96px;line-height:1}
  .prompt .q.roman{font-size:60px;font-weight:700;letter-spacing:1px}
  .choices{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .choice{
    border:1px solid var(--paper-line);background:var(--paper-2);color:var(--sumi);border-radius:6px;
    padding:18px;font-family:var(--serif);font-size:30px;cursor:pointer;transition:.13s;
  }
  .choice.roman{font-size:22px;font-weight:700;font-family:var(--sans)}
  .choice:hover:not(:disabled){border-color:var(--sumi-soft);transform:translateY(-1px)}
  .choice:focus-visible{outline:2px solid var(--shu);outline-offset:2px}
  .choice:disabled{cursor:default}
  .choice.correct{background:var(--good);color:#F4ECDB;border-color:var(--good)}
  .choice.wrong{background:var(--shu);color:#F4ECDB;border-color:var(--shu)}
  @keyframes shake{10%,90%{transform:translateX(-1px)}30%,70%{transform:translateX(3px)}50%{transform:translateX(-4px)}}
  .choice.wrong{animation:shake .4s}

  /* ---------- Recall (typing) ---------- */
  .recall-stage{max-width:440px;margin:0 auto;text-align:center}
  .recall-stage .glyph{font-family:var(--serif);font-size:130px;line-height:1;margin:10px 0 4px}
  .recall-stage .sub{font-size:12.5px;color:var(--sumi-soft);margin-bottom:20px;height:16px}
  .rinput{
    width:100%;max-width:280px;border:0;border-bottom:2.5px solid var(--paper-line);background:transparent;
    color:var(--sumi);font-family:var(--sans);font-size:32px;font-weight:500;text-align:center;
    padding:8px 4px;outline:none;letter-spacing:2px;transition:border-color .2s;
  }
  .rinput:focus{border-color:var(--sumi-soft)}
  .rinput.ok{border-color:var(--good);color:var(--good)}
  .rinput.no{border-color:var(--shu);color:var(--shu)}
  .reveal{height:24px;font-size:14px;margin:14px 0 18px;color:var(--sumi-soft)}
  .reveal b{color:var(--shu);font-weight:700}

  /* score chips */
  .score{display:flex;justify-content:center;gap:20px;margin-top:8px;font-size:13px;color:var(--sumi-soft)}
  .score b{font-family:var(--serif);font-size:18px;color:var(--sumi);font-weight:700;margin-right:3px}

  footer{margin-top:46px;padding-top:18px;border-top:1px solid var(--paper-line);font-size:12px;color:var(--sumi-soft);display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}
  footer a{color:var(--shu);text-decoration:none}
  .reset-link{background:none;border:0;color:var(--sumi-soft);cursor:pointer;font-size:12px;text-decoration:underline;font-family:var(--sans)}
  .reset-link:hover{color:var(--shu)}

  @media (max-width:560px){
    .brand p{display:none}
    nav.tabs button{margin-right:16px;font-size:14px}
    .drawer{left:18px;right:18px;width:auto}
    .flip{width:240px;height:260px}
    .face .glyph{font-size:110px}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
  }

  /* ---- kanji grid ---- */
  .kgrid.gk{grid-template-columns:repeat(auto-fill,minmax(70px,1fr))}
  .cell.kanji{aspect-ratio:auto;min-height:74px}
  .cell.kanji .ch{font-family:var(--serif);font-size:clamp(24px,5.5vw,32px)}
  .cell.kanji .ro{font-size:10px;text-align:center;padding:0 3px;line-height:1.15}
  /* ---- sub tabs ---- */
  .subbar{margin-bottom:16px}
  .subpane{display:none}
  .subpane.on{display:block;animation:fade .3s ease}
  /* ---- vocab list ---- */
  .vcat{font-family:var(--serif);font-weight:500;font-size:12.5px;letter-spacing:2px;text-transform:uppercase;color:var(--sumi-soft);margin:20px 0 9px;display:flex;align-items:center;gap:10px}
  .vcat:first-child{margin-top:0}
  .vcat::after{content:"";flex:1;height:1px;background:var(--paper-line)}
  .vlist{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .vrow{display:flex;align-items:center;gap:13px;border:1px solid var(--paper-line);background:var(--paper-2);border-radius:5px;padding:11px 13px;cursor:pointer;text-align:left;transition:.13s;font-family:var(--sans)}
  .vrow:hover{border-color:var(--sumi-soft);transform:translateY(-1px)}
  .vrow:focus-visible{outline:2px solid var(--shu);outline-offset:2px}
  .vrow .vw{font-family:var(--serif);font-size:22px;line-height:1;color:var(--sumi);flex:none}
  .vrow .vmeta{display:flex;flex-direction:column;min-width:0}
  .vrow .vmean{font-size:13.5px;color:var(--sumi)}
  .vrow .vread{font-size:11.5px;color:var(--sumi-soft);margin-top:2px}
  .vrow .vdots{margin-left:auto;display:flex;gap:2px;flex:none}
  .vrow .vdots i{width:4px;height:4px;border-radius:50%;background:var(--shu)}
  /* ---- drawer kanji/vocab body ---- */
  .drawer{width:360px;max-height:calc(100vh - 36px);overflow-y:auto}
  .k-mean{text-align:center;font-size:18px;font-weight:700;margin:2px 0}
  .k-sub{text-align:center;font-size:12px;color:var(--sumi-soft);margin-bottom:14px}
  .k-readings{display:grid;grid-template-columns:auto 1fr;gap:7px 14px;align-items:baseline;margin-bottom:6px}
  .k-readings .lab{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--sumi-soft)}
  .k-readings .val{font-family:var(--serif);font-size:16px}
  /* ---- stroke order ---- */
  .stroke-wrap{margin-top:14px;background:var(--paper);border:1px solid var(--paper-line);border-radius:6px;padding:12px}
  .stroke-head{display:flex;justify-content:space-between;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--sumi-soft);margin-bottom:8px}
  .stroke-svg{display:block;width:150px;height:150px;margin:0 auto;background:var(--paper-2);border-radius:4px}
  .stroke-svg .grid-lines line{stroke:var(--paper-line);stroke-width:.7;stroke-dasharray:3 4}
  .stroke-svg .stk-guide{fill:none;stroke:var(--paper-line);stroke-width:4.5;stroke-linecap:round;stroke-linejoin:round;opacity:.6}
  .stroke-svg .stk{fill:none;stroke:var(--sumi);stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
  .stroke-svg .stk-nums{display:none}
  .stroke-svg.show-num .stk-nums{display:block}
  .stroke-svg .stk-nums text{font-size:7px;fill:var(--shu);font-family:var(--sans);font-weight:700;dominant-baseline:middle;text-anchor:middle}
  .stroke-ctrls{display:flex;gap:7px;justify-content:center;margin-top:11px}
  .mini-btn{border:1px solid var(--paper-line);background:var(--paper-2);color:var(--sumi);border-radius:3px;padding:6px 12px;font-size:12.5px;font-family:var(--sans);cursor:pointer;transition:.13s}
  .mini-btn:hover{border-color:var(--shu);color:var(--shu)}
  .mini-btn:focus-visible{outline:2px solid var(--shu);outline-offset:2px}
  .attrib{font-size:11px;color:var(--sumi-soft);flex-basis:100%}
  .attrib a{color:var(--shu)}

  /* ---- learn path ---- */
  nav.tabs{flex-wrap:wrap}
  .unitcard{display:flex;align-items:center;gap:14px;border:1px solid var(--paper-line);background:var(--paper-2);border-radius:7px;padding:14px 16px;margin-bottom:11px;position:relative}
  .unitcard.locked{opacity:.5}
  .unitcard.full{border-color:rgba(var(--ink),.55)}
  .unitcard.review{border-color:var(--shu)}
  .unitcard.review.zzz{border-color:var(--paper-line);opacity:.75}
  .useal{flex:none;width:42px;height:42px;border-radius:6px;background:var(--shu);color:#F6EFE2;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:700;font-size:17px}
  .unitcard.full .useal{background:var(--sumi)}
  .unitcard.locked .useal{background:var(--sumi-soft)}
  .umain{flex:1;min-width:0}
  .utitle{font-weight:700;font-size:15.5px}
  .utitle .ujp{font-family:var(--serif);font-weight:500;color:var(--sumi-soft);font-size:13px;margin-left:7px}
  .usub{font-size:12.5px;color:var(--sumi-soft);margin-top:3px}
  .udots{display:flex;gap:8px;margin-top:9px}
  .ldot{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--sumi-soft);background:var(--paper);color:var(--sumi);font-family:var(--sans);font-size:13.5px;font-weight:700;cursor:pointer;transition:.13s}
  .ldot:hover:not([disabled]){border-color:var(--shu);color:var(--shu);transform:translateY(-1px)}
  .ldot.done{background:rgba(var(--ink),.85);border-color:transparent;color:#F6EFE2}
  .ldot[disabled]{opacity:.35;cursor:default}
  .ldot:focus-visible{outline:2px solid var(--shu);outline-offset:2px}
  .tipbtn{flex:none;width:30px;height:30px;border-radius:50%;border:1px solid var(--paper-line);background:var(--paper);color:var(--sumi-soft);font-weight:700;cursor:pointer;transition:.13s}
  .tipbtn:hover{border-color:var(--shu);color:var(--shu)}
  .lock{position:absolute;right:16px;top:12px;font-size:13px}
  .ubtn{flex:none}
  .path-end{text-align:center;font-size:13px;color:var(--sumi-soft);padding:18px 0 6px;font-style:italic}
  /* ---- lesson ---- */
  .lsn-top{display:flex;align-items:center;gap:12px;margin-bottom:22px}
  .lsn-x{flex:none;width:34px;height:34px;border:none;background:none;color:var(--sumi-soft);font-size:26px;line-height:1;cursor:pointer}
  .lsn-x:hover{color:var(--shu)}
  .lsn-pbar{flex:1;margin:0}
  .lsn-label{font-size:12px;letter-spacing:1.6px;text-transform:uppercase;color:var(--sumi-soft);margin-bottom:14px}
  .lsn-q{font-size:22px;font-weight:700;margin-bottom:6px}
  .lsn-q.jpq{font-family:var(--serif);font-weight:500;font-size:30px}
  .lsn-q.enq{font-size:21px}
  .lsn-q.sent{line-height:1.5}
  .lsn-ro{font-size:13px;color:var(--sumi-soft);margin-bottom:14px}
  .lsn-choices{margin-top:16px}
  .choice.picked{border-color:var(--shu);box-shadow:0 0 0 1px var(--shu) inset}
  .spk{border:none;background:none;font-size:18px;cursor:pointer;vertical-align:middle}
  .listenq{display:flex;gap:12px;margin:8px 0 4px}
  .bigspk{width:74px;height:74px;border-radius:12px;border:1px solid var(--paper-line);background:var(--paper-2);font-size:30px;cursor:pointer;transition:.13s}
  .bigspk:hover{border-color:var(--shu)}
  .bigspk.slow{width:56px;height:56px;align-self:flex-end;font-size:22px}
  .built{min-height:56px;border-bottom:1.5px solid var(--paper-line);display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start;padding:6px 2px;margin:14px 0 16px}
  .bank{display:flex;flex-wrap:wrap;gap:8px}
  .chip{border:1px solid var(--paper-line);background:var(--paper-2);border-radius:6px;padding:9px 14px;font-family:var(--serif);font-size:18px;color:var(--sumi);cursor:pointer;transition:.12s;box-shadow:0 1.5px 0 var(--paper-line)}
  .chip.roman{font-family:var(--sans);font-size:15px}
  .chip:hover{border-color:var(--sumi-soft)}
  .chip.used{opacity:.25;pointer-events:none}
  .chip.built-chip{background:var(--paper)}
  .chip:focus-visible{outline:2px solid var(--shu);outline-offset:2px}
  .mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
  .mcol{display:flex;flex-direction:column;gap:10px}
  .mopt{border:1px solid var(--paper-line);background:var(--paper-2);border-radius:6px;padding:13px 10px;cursor:pointer;transition:.12s;font-size:15px}
  .mopt.jp{font-family:var(--serif);font-size:19px}
  .mopt.picked{border-color:var(--shu);box-shadow:0 0 0 1px var(--shu) inset}
  .mopt.done{opacity:.3;pointer-events:none}
  .mopt.shake{animation:shake .3s ease}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  .lsn-foot{margin-top:26px}
  .btn.wide{width:100%;padding:14px;font-size:16px}
  .fbanner{margin-top:18px;border-radius:7px;padding:14px 16px;animation:fade .25s ease}
  .fbanner.good{background:rgba(46,110,74,.13);border:1px solid rgba(46,110,74,.4)}
  .fbanner.bad{background:rgba(178,58,44,.11);border:1px solid rgba(178,58,44,.4)}
  .fb-head{font-weight:700;font-size:14.5px}
  .fb-ans{margin-top:6px;font-family:var(--serif);font-size:17px}
  .tipcard{background:var(--paper-2);border:1px solid var(--paper-line);border-radius:7px;padding:18px 18px;font-size:15px;line-height:1.75}
  .tipjp{font-family:var(--serif);font-size:30px;margin-bottom:10px;color:var(--shu)}
  .lsn-end{text-align:center;padding:34px 0}
  .end-seal{width:86px;height:86px;border-radius:10px;background:var(--shu);color:#F6EFE2;font-family:var(--serif);font-size:30px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;transform:rotate(-3deg)}
  .end-title{font-size:21px;font-weight:800;margin-bottom:18px}
  .end-stats{display:flex;justify-content:center;gap:30px;margin-bottom:16px}
  .estat b{display:block;font-size:22px}
  .estat span{font-size:11.5px;letter-spacing:1px;text-transform:uppercase;color:var(--sumi-soft)}
  .end-note{font-size:13.5px;color:var(--sumi-soft);margin-bottom:8px;font-style:italic}
  .lsn-end .btn{max-width:340px;margin:14px auto 0}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <div class="seal" aria-hidden="true">墨</div>
      <div>
        <h1>Sumi</h1>
        <p>Kana, soaked in &mdash; ひらがな &amp; カタカナ</p>
      </div>
    </div>
    <div class="top-spacer"></div>
    <button class="icon-btn" id="nightBtn" aria-label="Toggle night mode">🌙 <span id="nightLbl">Night</span></button>
  </header>

  <!-- Controls -->
  <div class="controls" id="controls">
    <div class="seg" role="group" aria-label="Script">
      <button data-script="h" class="on">ひらがな Hiragana</button>
      <button data-script="k">カタカナ Katakana</button>
    </div>
    <span class="ctl-label">Include</span>
    <label class="check"><input type="checkbox" id="setBasic" checked> Basic</label>
    <label class="check"><input type="checkbox" id="setDaku"> Dakuten</label>
    <label class="check"><input type="checkbox" id="setCombo"> Combos</label>
  </div>

  <!-- Tabs -->
  <nav class="tabs" role="tablist">
    <button data-mode="learn" class="on" role="tab">Learn<span class="jp">道</span></button>
    <button data-mode="chart" role="tab">Chart<span class="jp">表</span></button>
    <button data-mode="cards" role="tab">Cards<span class="jp">札</span></button>
    <button data-mode="quiz" role="tab">Quiz<span class="jp">試</span></button>
    <button data-mode="recall" role="tab">Recall<span class="jp">書</span></button>
    <button data-mode="kanji" role="tab">Kanji<span class="jp">漢</span></button>
    <button data-mode="vocab" role="tab">Vocab<span class="jp">語</span></button>
  </nav>

  <!-- Stats -->
  <div class="stats" id="stats"></div>

  <!-- LEARN -->
  <section class="pane on" id="pane-learn">
    <div id="learnPath"></div>
    <div id="learnStage" style="display:none"></div>
  </section>

  <!-- CHART -->
  <section class="pane" id="pane-chart">
    <div id="chartArea"></div>
  </section>

  <!-- CARDS -->
  <section class="pane" id="pane-cards">
    <div class="qcount" id="cardsCount"></div>
    <div class="card-stage" id="cardStage"></div>
  </section>

  <!-- QUIZ -->
  <section class="pane" id="pane-quiz">
    <div class="pbar"><i id="quizBar"></i></div>
    <div class="quiz-stage" id="quizStage"></div>
    <div class="score" id="quizScore"></div>
  </section>

  <!-- RECALL -->
  <section class="pane" id="pane-recall">
    <div class="recall-stage" id="recallStage"></div>
    <div class="score" id="recallScore"></div>
  </section>

  <!-- KANJI -->
  <section class="pane" id="pane-kanji">
    <div class="subbar"><div class="seg subseg" id="kanjiSub" role="group" aria-label="Kanji mode">
      <button data-sub="browse" class="on">Browse</button>
      <button data-sub="quiz">Practice</button>
    </div></div>
    <div class="subpane on" id="kanjiBrowse"></div>
    <div class="subpane" id="kanjiQuiz">
      <div class="pbar"><i id="kqBar"></i></div>
      <div class="quiz-stage" id="kqStage"></div>
      <div class="score" id="kqScore"></div>
    </div>
  </section>

  <!-- VOCAB -->
  <section class="pane" id="pane-vocab">
    <div class="subbar"><div class="seg subseg" id="vocabSub" role="group" aria-label="Vocab mode">
      <button data-sub="browse" class="on">Browse</button>
      <button data-sub="cards">Cards</button>
    </div></div>
    <div class="subpane on" id="vocabBrowse"></div>
    <div class="subpane" id="vocabCards">
      <div class="qcount" id="vcCount"></div>
      <div class="card-stage" id="vcStage"></div>
    </div>
  </section>

  <footer>
    <span>Made with 墨 &mdash; deploy it to GitHub Pages or Vercel as a single file.</span>
    <button class="reset-link" id="resetBtn">Reset all progress</button>
    <span class="attrib">Stroke order from <a href="http://kanjivg.tagaini.net" target="_blank" rel="noopener">KanjiVG</a> (CC BY-SA 3.0); kanji readings from the open kanji-data set.</span>
  </footer>
</div>

<!-- Detail drawer -->
<div class="drawer-bg" id="drawerBg"></div>
<div class="drawer" id="drawer" role="dialog" aria-label="Detail">
  <button class="close" id="drawerClose" aria-label="Close">×</button>
  <div id="drawerBody"></div>
</div>

<script>
"use strict";

/* =========================================================
   DATA  — Hepburn romanization. accept[] holds alt typings.
   Each entry: {id, h, k, r, accept[], type, note}
   ========================================================= */

// helper to build accept arrays for the few irregular ones
const ALT = {
  shi:['shi','si'], chi:['chi','ti'], tsu:['tsu','tu'], fu:['fu','hu'],
  ji:['ji','zi'], wo:['wo','o'], n:['n','nn'],
  sha:['sha','sya'], shu:['shu','syu'], sho:['sho','syo'],
  cha:['cha','tya'], chu:['chu','tyu'], cho:['cho','tyo'],
  ja:['ja','jya','zya'], ju:['ju','jyu','zyu'], jo:['jo','jyo','zyo']
};
function acc(r, override){ return override || ALT[r] || [r]; }

// ---- BASIC gojūon (rows of 5, null = gap) ----
const BASIC = [
  [['a','あ','ア','a'],['i','い','イ','i'],['u','う','ウ','u'],['e','え','エ','e'],['o','お','オ','o']],
  [['ka','か','カ','ka'],['ki','き','キ','ki'],['ku','く','ク','ku'],['ke','け','ケ','ke'],['ko','こ','コ','ko']],
  [['sa','さ','サ','sa'],['shi','し','シ','shi'],['su','す','ス','su'],['se','せ','セ','se'],['so','そ','ソ','so']],
  [['ta','た','タ','ta'],['chi','ち','チ','chi'],['tsu','つ','ツ','tsu'],['te','て','テ','te'],['to','と','ト','to']],
  [['na','な','ナ','na'],['ni','に','ニ','ni'],['nu','ぬ','ヌ','nu'],['ne','ね','ネ','ne'],['no','の','ノ','no']],
  [['ha','は','ハ','ha'],['hi','ひ','ヒ','hi'],['fu','ふ','フ','fu'],['he','へ','ヘ','he'],['ho','ほ','ホ','ho']],
  [['ma','ま','マ','ma'],['mi','み','ミ','mi'],['mu','む','ム','mu'],['me','め','メ','me'],['mo','も','モ','mo']],
  [['ya','や','ヤ','ya'],null,['yu','ゆ','ユ','yu'],null,['yo','よ','ヨ','yo']],
  [['ra','ら','ラ','ra'],['ri','り','リ','ri'],['ru','る','ル','ru'],['re','れ','レ','re'],['ro','ろ','ロ','ro']],
  [['wa','わ','ワ','wa'],null,null,null,['wo','を','ヲ','wo']],
  [['n','ん','ン','n'],null,null,null,null]
];

// mnemonics for basic hiragana (memory aids, not rules)
const MN = {
  a:'Looks like a capital A with an extra loop.',
  i:'Two strokes like the “ee” twins standing up.',
  u:'A face in profile going “ooh.”',
  e:'An energetic bird about to take off.',
  o:'An “o” with a little tail kicking out.',
  ka:'“Ka” is mosquito in Japanese — picture one biting.',
  ki:'A key.',
  ku:'A cuckoo’s open beak — “ku-ku.”',
  ke:'A keg lying on its side.',
  ko:'Two short coils stacked.',
  sa:'A person sat down with a sigh.',
  shi:'A fishing hook from below — “she” fishes.',
  su:'A swirl, like a spring (su-pring).',
  se:'A mouth opening to “say.”',
  so:'A zig-zag, like sewing thread.',
  ta:'A “t” crossed with an “a.”',
  chi:'A cheerleader doing a kick.',
  tsu:'A wave curling — a tsu-nami.',
  te:'“Te” means hand — picture a hand.',
  to:'A toe with a single nail.',
  na:'A knot tied in rope.',
  ni:'A bent knee.',
  nu:'A strand of noodles.',
  ne:'A cat’s curling tail (neko = cat).',
  no:'A no-entry swirl.',
  ha:'An “h” leaning on an “a.”',
  hi:'A wide smile going “hee.”',
  fu:'Mount Fuji with a little smoke.',
  he:'A low hill on the horizon.',
  ho:'Like は but with an extra bar.',
  ma:'Mama with a bun in her hair.',
  mi:'Looks like the number 21 — “me” said softly.',
  mu:'A cow going “muu.”',
  me:'“Me” means eye — picture an eye.',
  mo:'A fish-hook with bait.',
  ya:'A yak with horns.',
  yu:'A unique fish swimming.',
  yo:'A yo-yo on its string.',
  ra:'A rabbit’s ear flopping.',
  ri:'Two tall reeds side by side.',
  ru:'A loop, like a route bending back.',
  re:'A person bending at the waist.',
  ro:'Like る but without the loop — a road.',
  wa:'A swan saying “wah.”',
  wo:'Carrying an object — を marks the object.',
  n:'A single “n,” a soft hum at a word’s end.'
};

// ---- DAKUTEN / HANDAKUTEN ----
const DAKU = [
  [['ga','が','ガ','ga'],['gi','ぎ','ギ','gi'],['gu','ぐ','グ','gu'],['ge','げ','ゲ','ge'],['go','ご','ゴ','go']],
  [['za','ざ','ザ','za'],['zi','じ','ジ','ji'],['zu','ず','ズ','zu'],['ze','ぜ','ゼ','ze'],['zo','ぞ','ゾ','zo']],
  [['da','だ','ダ','da'],['dji','ぢ','ヂ','ji'],['dzu','づ','ヅ','zu'],['de','で','デ','de'],['do','ど','ド','do']],
  [['ba','ば','バ','ba'],['bi','び','ビ','bi'],['bu','ぶ','ブ','bu'],['be','べ','ベ','be'],['bo','ぼ','ボ','bo']],
  [['pa','ぱ','パ','pa'],['pi','ぴ','ピ','pi'],['pu','ぷ','プ','pu'],['pe','ぺ','ペ','pe'],['po','ぽ','ポ','po']]
];
const DAKU_ACC = { zi:['ji','zi'], dji:['ji','di','dji'], dzu:['zu','du','dzu'] };

// ---- YŌON COMBOS ----
const COMBO = [
  [['kya','きゃ','キャ','kya'],['kyu','きゅ','キュ','kyu'],['kyo','きょ','キョ','kyo']],
  [['sha','しゃ','シャ','sha'],['shu','しゅ','シュ','shu'],['sho','しょ','ショ','sho']],
  [['cha','ちゃ','チャ','cha'],['chu','ちゅ','チュ','chu'],['cho','ちょ','チョ','cho']],
  [['nya','にゃ','ニャ','nya'],['nyu','にゅ','ニュ','nyu'],['nyo','にょ','ニョ','nyo']],
  [['hya','ひゃ','ヒャ','hya'],['hyu','ひゅ','ヒュ','hyu'],['hyo','ひょ','ヒョ','hyo']],
  [['mya','みゃ','ミャ','mya'],['myu','みゅ','ミュ','myu'],['myo','みょ','ミョ','myo']],
  [['rya','りゃ','リャ','rya'],['ryu','りゅ','リュ','ryu'],['ryo','りょ','リョ','ryo']],
  [['gya','ぎゃ','ギャ','gya'],['gyu','ぎゅ','ギュ','gyu'],['gyo','ぎょ','ギョ','gyo']],
  [['ja','じゃ','ジャ','ja'],['ju','じゅ','ジュ','ju'],['jo','じょ','ジョ','jo']],
  [['bya','びゃ','ビャ','bya'],['byu','びゅ','ビュ','byu'],['byo','びょ','ビョ','byo']],
  [['pya','ぴゃ','ピャ','pya'],['pyu','ぴゅ','ピュ','pyu'],['pyo','ぴょ','ピョ','pyo']]
];

// Build a flat lookup of all entries with id, type, accept, note
const ALL = {}; // id -> entry
function regGrid(grid, type){
  grid.forEach(row=>row.forEach(c=>{
    if(!c) return;
    const [id,h,k,r] = c;
    const accept = (type==='daku' ? (DAKU_ACC[id]||acc(r)) : acc(r));
    ALL[id] = {id,h,k,r,accept,type};
  }));
}
regGrid(BASIC,'basic'); regGrid(DAKU,'daku'); regGrid(COMBO,'combo');

// construction notes for daku/combo (first-principles), mnemonics for basic
function noteFor(id){
  const e = ALL[id];
  if(e.type==='basic'){
    const m = MN[id]||'';
    return m ? `<b>Hint:</b> ${m}` : '';
  }
  if(e.type==='daku'){
    // find base kana by stripping the mark
    const baseMap = {g:'k',z:'s',d:'t',b:'h',p:'h'};
    const first = e.r[0];
    const baseCons = baseMap[first];
    const mark = (first==='p') ? '゜ (handakuten / maru)' : '゛ (dakuten / tenten)';
    return `<b>Built from:</b> the ${baseCons}-row kana + ${mark}. The mark voices the sound (e.g. k→g, s→z, t→d, h→b or p).`;
  }
  // combo
  return `<b>Built from:</b> a full-size i-column kana + a small ${e.h.slice(-1)} glide. Two kana written, but said as one beat.`;
}

/* =========================================================
   STORAGE — localStorage with in-memory fallback
   ========================================================= */
const Store = (()=>{
  let mem={}, ok=false;
  try{ const t='__sumi_t'; localStorage.setItem(t,'1'); localStorage.removeItem(t); ok=true; }catch(e){ ok=false; }
  return {
    persistent: ok,
    get(k,d){ try{ if(ok){const v=localStorage.getItem(k);return v==null?d:JSON.parse(v);} return (k in mem)?mem[k]:d; }catch(e){return d;} },
    set(k,v){ try{ if(ok) localStorage.setItem(k,JSON.stringify(v)); else mem[k]=v; }catch(e){ mem[k]=v; } }
  };
})();

/* =========================================================
   STATE & PROGRESS
   progress key = script:id  (hiragana & katakana tracked apart)
   value = {streak, seen, correct}
   mastery = clamp(streak,0,5)
   ========================================================= */
const PKEY='sumi_progress_v1';
let progress = Store.get(PKEY, {});

const state = {
  script: Store.get('sumi_script','h'),
  sets: Store.get('sumi_sets', {basic:true,daku:false,combo:false}),
  mode: 'chart',
  kanjiSub: 'browse',
  vocabSub: 'browse',
  night: Store.get('sumi_night', false)
};

function pkey(script,id){ return script+':'+id; }
function getP(script,id){ return progress[pkey(script,id)] || {streak:0,seen:0,correct:0}; }
function mastery(script,id){ return Math.max(0,Math.min(5,getP(script,id).streak)); }
function record(script,id,correct){
  const k=pkey(script,id);
  const p=progress[k]||{streak:0,seen:0,correct:0};
  p.seen++;
  if(correct){ p.correct++; p.streak=Math.min(5,p.streak+1); }
  else { p.streak=Math.max(0,p.streak-1); }
  progress[k]=p;
  Store.set(PKEY,progress);
}

// pool of active entries based on script + checked sets
function activeEntries(){
  const out=[];
  const want = state.sets;
  for(const id in ALL){
    const e=ALL[id];
    if((e.type==='basic'&&want.basic)||(e.type==='daku'&&want.daku)||(e.type==='combo'&&want.combo)){
      out.push(e);
    }
  }
  return out;
}

/* =========================================================
   SPEECH (Web Speech API) — graceful if no JP voice
   ========================================================= */
let jaVoice=null, speechReady=false;
function loadVoices(){
  if(!('speechSynthesis' in window)) return;
  const vs = speechSynthesis.getVoices();
  jaVoice = vs.find(v=>v.lang && v.lang.toLowerCase().startsWith('ja')) || null;
  speechReady = vs.length>0;
}
if('speechSynthesis' in window){
  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
}
function speak(text){
  if(!('speechSynthesis' in window)) return;
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ja-JP'; if(jaVoice) u.voice=jaVoice; u.rate=0.8;
  speechSynthesis.cancel(); speechSynthesis.speak(u);
}

/* =========================================================
   RENDER: CHART
   ========================================================= */
const chartArea=document.getElementById('chartArea');

function cellHTML(e){
  const ch = state.script==='h'?e.h:e.k;
  const m = mastery(state.script,e.id);
  // ink shading: alpha grows with mastery
  const alpha = m===0?0: (0.16 + m*0.165); // up to ~0.99 at 5
  const lit = m>=3;
  const dots = m>0 ? '<span class="dots">'+'<i></i>'.repeat(Math.min(m,5))+'</span>' : '';
  return `<button class="cell ${lit?'lit':''}" data-id="${e.id}"
      style="background:${m===0?'var(--paper-2)':'rgba(var(--ink),'+alpha.toFixed(2)+')'}"
      aria-label="${ch} (${e.r}), mastery ${m} of 5">
      ${dots}<span class="ch">${ch}</span><span class="ro">${e.r}</span></button>`;
}
function emptyCell(){ return '<span class="cell empty" aria-hidden="true"></span>'; }

function renderGrid(grid,cols){
  let html='';
  grid.forEach(row=>{
    row.forEach(c=>{ html += c?cellHTML(ALL[c[0]]):emptyCell(); });
  });
  return `<div class="kgrid g${cols}">${html}</div>`;
}

function renderChart(){
  let html='';
  if(state.sets.basic){
    html += `<div class="grid-block"><h3>Basic &mdash; 五十音 Gojūon</h3>${renderGrid(BASIC,5)}</div>`;
  }
  if(state.sets.daku){
    html += `<div class="grid-block"><h3>Dakuten &amp; Handakuten &mdash; 濁音・半濁音</h3>${renderGrid(DAKU,5)}</div>`;
  }
  if(state.sets.combo){
    html += `<div class="grid-block"><h3>Combos &mdash; 拗音 Yōon</h3>${renderGrid(COMBO,3)}</div>`;
  }

/* =========================================================
   WEIGHTED PICK — favors low-mastery characters
   ========================================================= */
function weightedPick(pool, exclude){
  const cand = exclude ? pool.filter(e=>e.id!==exclude.id) : pool;
  // weight = 6 - mastery (so 0-mastery weight 6, mastered weight 1)
  let total=0; const weights=cand.map(e=>{const w=6-mastery(state.script,e.id);total+=w;return w;});
  let r=Math.random()*total;
  for(let i=0;i<cand.length;i++){ r-=weights[i]; if(r<=0) return cand[i]; }
  return cand[cand.length-1];
}
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

/* =========================================================
   FLASHCARDS
   ========================================================= */
const cardStage=document.getElementById('cardStage'), cardsCount=document.getElementById('cardsCount');
let deck=[], deckPos=0;
function buildDeck(){
  const pool=activeEntries();
  // weak-first ordering: sort by mastery asc, then shuffle within
  deck = shuffle(pool).sort((a,b)=>mastery(state.script,a.id)-mastery(state.script,b.id));
  deckPos=0;
}
function renderCard(){
  if(!deck.length){ cardStage.innerHTML=emptyStudy(); cardsCount.textContent=''; return; }
  if(deckPos>=deck.length) buildDeck();
  const e=deck[deckPos]; const ch=state.script==='h'?e.h:e.k;
  cardsCount.textContent=`Card ${deckPos+1} of ${deck.length} · weak ones first`;
  cardStage.innerHTML=`
    <div class="flip" id="flip" tabindex="0" role="button" aria-label="Flashcard, tap to flip">
      <div class="flip-inner">
        <div class="face front"><span class="tag">${state.script==='h'?'hiragana':'katakana'}</span><span class="glyph">${ch}</span><span class="hint">tap to reveal</span></div>
        <div class="face back"><span class="tag">romaji</span><span class="glyph">${e.r}</span><span class="hint">${e.accept.filter(a=>a!==e.r).join(' · ')||'\u00A0'}</span></div>
      </div>
    </div>
    <span class="flip-tip">Did you recall it?</span>
    <div class="card-actions">
      <button class="btn again" id="cAgain">Review again</button>
      <button class="btn good" id="cGood">Got it →</button>
    </div>`;
  const flip=document.getElementById('flip');
  const doFlip=()=>flip.classList.toggle('flipped');
  flip.addEventListener('click',doFlip);
  flip.addEventListener('keydown',ev=>{ if(ev.key===' '||ev.key==='Enter'){ev.preventDefault();doFlip();} });
  document.getElementById('cGood').onclick=()=>{ record(state.script,e.id,true); next(); };
  document.getElementById('cAgain').onclick=()=>{ record(state.script,e.id,false); next(); };
  function next(){ deckPos++; renderCard(); renderStats(); }
}

/* =========================================================
   QUIZ — multiple choice, alternates direction
   ========================================================= */
const quizStage=document.getElementById('quizStage'), quizBar=document.getElementById('quizBar'), quizScore=document.getElementById('quizScore');
let quiz={right:0,total:0,cur:null,dir:'k2r',answered:false};
function newQuiz(){
  const pool=activeEntries();
  if(pool.length<4){ quizStage.innerHTML=emptyStudy(pool.length?'Need at least 4 characters — add another set.':null); quizScore.textContent=''; quizBar.style.width='0'; return; }
  quiz.cur=weightedPick(pool);
  quiz.dir = Math.random()<0.5?'k2r':'r2k';
  quiz.answered=false;
  const e=quiz.cur, ch=state.script==='h'?e.h:e.k;
  // distractors
  const others=shuffle(pool.filter(x=>x.id!==e.id)).slice(0,3);
  const opts=shuffle([e,...others]);
  let html;
  if(quiz.dir==='k2r'){
    html=`<div class="prompt"><div class="label">${state.script==='h'?'hiragana':'katakana'} → romaji</div><div class="q">${ch}</div></div>
      <div class="choices">${opts.map(o=>`<button class="choice roman" data-id="${o.id}">${o.r}</button>`).join('')}</div>`;
  } else {
    html=`<div class="prompt"><div class="label">romaji → ${state.script==='h'?'hiragana':'katakana'}</div><div class="q roman">${e.r}</div></div>
      <div class="choices">${opts.map(o=>`<button class="choice" data-id="${o.id}">${state.script==='h'?o.h:o.k}</button>`).join('')}</div>`;
  }
  quizStage.innerHTML=html;
  quizStage.querySelectorAll('.choice').forEach(b=>b.addEventListener('click',()=>answerQuiz(b)));
  quizBar.style.width = quiz.total? Math.min(100,(quiz.total%10)*10)+'%':'0';
  renderQuizScore();
}
function answerQuiz(btn){
  if(quiz.answered) return; quiz.answered=true;
  const chosen=btn.dataset.id, correct=quiz.cur.id;
  const ok = chosen===correct;
  quiz.total++; if(ok) quiz.right++;
  record(state.script,correct,ok);
  quizStage.querySelectorAll('.choice').forEach(b=>{
    b.disabled=true;
    if(b.dataset.id===correct) b.classList.add('correct');
    else if(b===btn) b.classList.add('wrong');
  });
  renderStats(); renderQuizScore();
  setTimeout(newQuiz, ok?650:1150);
}
function renderQuizScore(){
  quizScore.innerHTML = quiz.total? `<span><b>${quiz.right}</b>/${quiz.total} correct</span><span><b>${Math.round(quiz.right/quiz.total*100)}</b>% accuracy</span>`:'';
}

/* =========================================================
   RECALL — type the romaji
   ========================================================= */
const recallStage=document.getElementById('recallStage'), recallScore=document.getElementById('recallScore');
let recall={right:0,total:0,cur:null};
function newRecall(){
  const pool=activeEntries();
  if(!pool.length){ recallStage.innerHTML=emptyStudy(); recallScore.textContent=''; return; }
  recall.cur=weightedPick(pool);
  const e=recall.cur, ch=state.script==='h'?e.h:e.k;
  recallStage.innerHTML=`
    <div class="glyph">${ch}</div>
    <div class="sub">${state.script==='h'?'hiragana':'katakana'} — type the romaji</div>
    <input class="rinput" id="rIn" autocomplete="off" autocapitalize="off" spellcheck="false" aria-label="Type romaji">
    <div class="reveal" id="rReveal">&nbsp;</div>
    <button class="btn primary" id="rCheck">Check (Enter)</button>`;
  const inp=document.getElementById('rIn'); inp.focus();
  const submit=()=>checkRecall(inp);
  inp.addEventListener('keydown',ev=>{ if(ev.key==='Enter') submit(); });
  document.getElementById('rCheck').onclick=submit;
  renderRecallScore();
}
function checkRecall(inp){
  if(inp.disabled) return;
  const val=inp.value.trim().toLowerCase();
  if(!val) return;
  const e=recall.cur;
  const ok=e.accept.includes(val);
  recall.total++; if(ok) recall.right++;
  record(state.script,e.id,ok);
  inp.disabled=true; inp.classList.add(ok?'ok':'no');
  const rev=document.getElementById('rReveal');
  rev.innerHTML = ok? `✓ <b>${e.r}</b>` : `✗ it was <b>${e.r}</b>`;
  document.getElementById('rCheck').textContent='Next →';
  document.getElementById('rCheck').onclick=newRecall;
  renderStats(); renderRecallScore();
  // allow Enter to advance
  document.addEventListener('keydown',function adv(ev){ if(ev.key==='Enter'){ document.removeEventListener('keydown',adv); newRecall(); } });
}
function renderRecallScore(){
  recallScore.innerHTML = recall.total? `<span><b>${recall.right}</b>/${recall.total} correct</span><span><b>${Math.round(recall.right/recall.total*100)}</b>% accuracy</span>`:'';
}

function emptyStudy(msg){

}

/* =========================================================
   STATS STRIP
   ========================================================= */
function currentDomain(){ return state.mode==='kanji'?'kanji':(state.mode==='vocab'?'vocab':'kana'); }
function renderStats(){
  if(state.mode==='learn'){ renderLearnStats(); return; }
  const dom=currentDomain();
  let pool,ns,keyFn,inkLabel;
  if(dom==='kanji'){ pool=KANJI; ns='kanji'; keyFn=e=>e.c; inkLabel='Grid inked'; }
  else if(dom==='vocab'){ pool=VOCAB; ns='vocab'; keyFn=e=>e.id; inkLabel='Words inked'; }
  else { pool=activeEntries(); ns=state.script; keyFn=e=>e.id; inkLabel='Chart inked'; }
  const total=pool.length;
  let learned=0, masteredCount=0, seenSum=0, correctSum=0;
  pool.forEach(e=>{
    const id=keyFn(e); const m=mastery(ns,id); const p=getP(ns,id);
    if(m>=1) learned++; if(m>=5) masteredCount++;
    seenSum+=p.seen; correctSum+=p.correct;
  });
  const pct = total? Math.round(masteredCount/total*100):0;
  const accuracy = seenSum? Math.round(correctSum/seenSum*100):'—';
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="n">${masteredCount}<span class="unit">/${total}</span></div><div class="l">Mastered</div></div>
    <div class="stat"><div class="n">${pct}<span class="unit">%</span></div><div class="l">${inkLabel}</div></div>
    <div class="stat"><div class="n">${learned}</div><div class="l">Started</div></div>
    <div class="stat"><div class="n">${accuracy}${accuracy==='—'?'':'<span class="unit">%</span>'}</div><div class="l">Accuracy</div></div>`;
}

/* ---------- weighted pick generalized over a namespace + id key ---------- */
function weightedPickNS(pool, ns, key){
  let total=0; const ws=pool.map(e=>{const w=6-mastery(ns,e[key]); total+=w; return w;});
  let r=Math.random()*total;
  for(let i=0;i<pool.length;i++){ r-=ws[i]; if(r<=0) return pool[i]; }
  return pool[pool.length-1];
}

const isKanjiChar = c=>/[\u4e00-\u9faf]/.test(c);
function strokeBlock(char){
  const ds=STROKES[char];
  if(!ds || !ds.length) return '';
  const guides=ds.map(d=>`<path d="${d}" class="stk-guide"/>`).join('');
  const strokes=ds.map((d,i)=>`<path d="${d}" class="stk" data-i="${i}"/>`).join('');
  return `<div class="stroke-wrap">
    <div class="stroke-head"><span>${isKanjiChar(char)?'Kanji ':''}stroke order</span><span>${ds.length} stroke${ds.length>1?'s':''}</span></div>
    <svg class="stroke-svg" viewBox="0 0 109 109" xmlns="http://www.w3.org/2000/svg">
      <g class="grid-lines"><line x1="54.5" y1="3" x2="54.5" y2="106"/><line x1="3" y1="54.5" x2="106" y2="54.5"/></g>
      <g class="guides">${guides}</g>
      <g class="strokes">${strokes}</g>
    </svg>
    <div class="stroke-ctrls">
      <button class="mini-btn" data-act="play">▶ Replay</button>
      <button class="mini-btn" data-act="step">Step</button>
      <button class="mini-btn" data-act="num">№ Numbers</button>
    </div>
  </div>`;
}
function wireStrokes(container){
  const reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;
  container.querySelectorAll('.stroke-svg').forEach(svg=>{
    const paths=[...svg.querySelectorAll('.stk')];
    paths.forEach(p=>{ const L=p.getTotalLength()||1; p.dataset.len=L; p.style.strokeDasharray=L; p.style.strokeDashoffset=L; });
    let shown=0, timer=null;
    function revealAt(i,instant){
      const p=paths[i]; if(!p) return 0;
      const L=+p.dataset.len; const dur = instant?0: Math.max(160, Math.min(650, L*7));
      p.style.transition = instant?'none':`stroke-dashoffset ${dur}ms linear`;
      void p.getBoundingClientRect();
      p.style.strokeDashoffset=0; return dur;
    }
    function reset(){ clearTimeout(timer); paths.forEach(p=>{p.style.transition='none';p.style.strokeDashoffset=p.dataset.len;}); shown=0; }
    function play(){
      reset();
      if(reduce){ paths.forEach(p=>p.style.strokeDashoffset=0); shown=paths.length; return; }
      let i=0; const tick=()=>{ if(i>=paths.length) return; const d=revealAt(i,false); shown=++i; timer=setTimeout(tick,d+150); }; tick();
    }
    function step(){ if(shown>=paths.length) reset(); revealAt(shown,false); shown++; }
    const wrap=svg.closest('.stroke-wrap');
    wrap.querySelector('[data-act="play"]').onclick=play;
    wrap.querySelector('[data-act="step"]').onclick=step;
    wrap.querySelector('[data-act="num"]').onclick=()=>{
      svg.classList.toggle('show-num');
      if(svg.classList.contains('show-num') && !svg.dataset.numbered){ addNumbers(svg,paths); svg.dataset.numbered='1'; }
    };
    play();
  });
}
function addNumbers(svg,paths){
  const NS='http://www.w3.org/2000/svg';
  const g=document.createElementNS(NS,'g'); g.setAttribute('class','stk-nums');
  paths.forEach((p,i)=>{
    let pt; try{ pt=p.getPointAtLength(0); }catch(e){ pt={x:5,y:5}; }
    const t=document.createElementNS(NS,'text');
    t.setAttribute('x',pt.x); t.setAttribute('y',pt.y); t.textContent=String(i+1);
    g.appendChild(t);
  });
  svg.appendChild(g);
}

function showDrawer(html, speakFn){
  const body=document.getElementById('drawerBody');
  body.innerHTML=html;
  const sb=body.querySelector('#dSpeak');
  if(sb && speakFn) sb.onclick=speakFn;
  drawer.classList.add('show'); drawerBg.classList.add('show');
  drawer.scrollTop=0;
  requestAnimationFrame(()=>wireStrokes(body));
}
function speakAvail(){ return ('speechSynthesis' in window); }

function openKana(id){
  const e=ALL[id]; const ch=state.script==='h'?e.h:e.k;
  const m=mastery(state.script,id), p=getP(state.script,id);
  const alts=e.accept.filter(a=>a!==e.r);
  const body=`
    <div class="big">${ch}</div>
    <div class="roline">${e.r}</div>
    <div class="alt">${alts.length?'also typed: '+alts.join(', '):'&nbsp;'}</div>
    <div class="drawer-row"><button class="speak-btn" id="dSpeak" ${speakAvail()?'':'disabled'}>🔊 Say it</button></div>
    <div class="note">${noteFor(id)}</div>
    ${strokeBlock(ch)}
    <div class="mastery-line">Mastery <span class="mdots">${dotsHTML(m)}</span><span style="margin-left:auto">${p.seen?`${p.correct}/${p.seen} correct`:'not yet drilled'}</span></div>`;
  showDrawer(body, ()=>speak(ch));
}
function openKanji(char){
  const k=KMAP[char]; const ns='kanji';
  const m=mastery(ns,char), p=getP(ns,char);
  const on=k.on.length?k.on.join('、'):'—';
  const kun=k.kun.length?k.kun.join('、'):'—';
  const say=(k.kun[0]||k.on[0]||char).replace(/・.*/,'')||char;
  const body=`
    <div class="big">${char}</div>
    <div class="k-mean">${k.m.join(', ')}</div>
    <div class="k-sub">${k.st} strokes · JLPT N5${k.g?` · school grade ${k.g}`:''}</div>
    <div class="drawer-row"><button class="speak-btn" id="dSpeak" ${speakAvail()?'':'disabled'}>🔊 Say a reading</button></div>
    <div class="k-readings">
      <span class="lab">On’yomi</span><span class="val">${on}</span>
      <span class="lab">Kun’yomi</span><span class="val">${kun}</span>
    </div>
    ${strokeBlock(char)}
    <div class="mastery-line" style="margin-top:14px">Mastery <span class="mdots">${dotsHTML(m)}</span><span style="margin-left:auto">${p.seen?`${p.correct}/${p.seen} correct`:'not yet drilled'}</span></div>`;
  showDrawer(body, ()=>speak(say));
}
function openVocab(id){
  const v=VMAP[id]; const ns='vocab';
  const m=mastery(ns,id), p=getP(ns,id);
  const kanjiChars=[...v.w].filter(c=>isKanjiChar(c) && STROKES[c]);
  const strokes=kanjiChars.map(c=>strokeBlock(c)).join('');
  const body=`
    <div class="big" style="font-size:58px;line-height:1.05">${v.w}</div>
    <div class="roline" style="font-size:16px">${v.reading}</div>
    <div class="alt">${v.r}</div>
    <div class="k-mean" style="margin-top:8px">${v.m}</div>
    <div class="drawer-row" style="margin-top:12px"><button class="speak-btn" id="dSpeak" ${speakAvail()?'':'disabled'}>🔊 Say it</button></div>
    ${strokes? `<div class="k-sub" style="margin:4px 0 0">Kanji in this word</div>${strokes}`:''}
    <div class="mastery-line" style="margin-top:14px">Mastery <span class="mdots">${dotsHTML(m)}</span><span style="margin-left:auto">${p.seen?`${p.correct}/${p.seen} correct`:'not yet drilled'}</span></div>`;
  showDrawer(body, ()=>speak(v.reading));
}

const kqStage=document.getElementById('kqStage'), kqBar=document.getElementById('kqBar'), kqScore=document.getElementById('kqScore');
function renderKanji(){
  const html=KANJI.map(k=>{
    const m=mastery('kanji',k.c);
    const alpha=m===0?0:(0.16+m*0.165);
    const dots=m>0?'<span class="dots">'+'<i></i>'.repeat(Math.min(m,5))+'</span>':'';
    return `<button class="cell kanji ${m>=3?'lit':''}" data-c="${k.c}"
        style="background:${m===0?'var(--paper-2)':'rgba(var(--ink),'+alpha.toFixed(2)+')'}"
        aria-label="${k.c}, ${k.m[0]}, mastery ${m} of 5">
        ${dots}<span class="ch">${k.c}</span><span class="ro">${k.m[0]}</span></button>`;
  }).join('');
  document.getElementById('kanjiBrowse').innerHTML=
    `<div class="grid-block"><h3>JLPT N5 &mdash; 漢字 · ${KANJI.length} kanji</h3><div class="kgrid gk">${html}</div></div>`;
  document.querySelectorAll('#kanjiBrowse .cell[data-c]').forEach(b=>b.addEventListener('click',()=>openKanji(b.dataset.c)));
}
let kquiz={right:0,total:0,cur:null,dir:'k2m',answered:false};
function newKQuiz(){
  const pool=KANJI;
  kquiz.cur=weightedPickNS(pool,'kanji','c');
  kquiz.dir=Math.random()<0.5?'k2m':'m2k';
  kquiz.answered=false;
  const k=kquiz.cur;
  const opts=shuffle([k,...shuffle(pool.filter(x=>x.c!==k.c)).slice(0,3)]);
  let html;
  if(kquiz.dir==='k2m'){
    html=`<div class="prompt"><div class="label">kanji → meaning</div><div class="q">${k.c}</div></div>
      <div class="choices">${opts.map(o=>`<button class="choice roman" data-c="${o.c}">${o.m[0]}</button>`).join('')}</div>`;
  }else{
    html=`<div class="prompt"><div class="label">meaning → kanji</div><div class="q roman" style="font-size:32px">${k.m[0]}</div></div>
      <div class="choices">${opts.map(o=>`<button class="choice" data-c="${o.c}">${o.c}</button>`).join('')}</div>`;
  }
  kqStage.innerHTML=html;
  kqStage.querySelectorAll('.choice').forEach(b=>b.addEventListener('click',()=>answerKQuiz(b)));
  kqBar.style.width=kquiz.total?Math.min(100,(kquiz.total%10)*10)+'%':'0';
  renderKQScore();
}
function answerKQuiz(btn){
  if(kquiz.answered)return; kquiz.answered=true;
  const ok=btn.dataset.c===kquiz.cur.c;
  kquiz.total++; if(ok)kquiz.right++;
  record('kanji',kquiz.cur.c,ok);
  kqStage.querySelectorAll('.choice').forEach(b=>{b.disabled=true; if(b.dataset.c===kquiz.cur.c)b.classList.add('correct'); else if(b===btn)b.classList.add('wrong');});
  renderStats(); renderKQScore();
  setTimeout(newKQuiz, ok?650:1150);
}
function renderKQScore(){ kqScore.innerHTML=kquiz.total?`<span><b>${kquiz.right}</b>/${kquiz.total} correct</span><span><b>${Math.round(kquiz.right/kquiz.total*100)}</b>% accuracy</span>`:''; }

/* =========================================================
   VOCAB views
   ========================================================= */
const vcStage=document.getElementById('vcStage'), vcCount=document.getElementById('vcCount');
function renderVocab(){
  let html='';
  VCATS.forEach(cat=>{
    const items=VOCAB.filter(v=>v.cat===cat);
    html+=`<div class="vcat">${cat}</div><div class="vlist">`;
    html+=items.map(v=>{
      const m=mastery('vocab',v.id);
      const dots=m>0?'<span class="vdots">'+'<i></i>'.repeat(Math.min(m,5))+'</span>':'';
      return `<button class="vrow" data-id="${v.id}">
        <span class="vw">${v.w}</span>
        <span class="vmeta"><span class="vmean">${v.m}</span><span class="vread">${v.reading} · ${v.r}</span></span>
        ${dots}</button>`;
    }).join('');
    html+='</div>';
  });
  document.getElementById('vocabBrowse').innerHTML=html;
  document.querySelectorAll('#vocabBrowse .vrow').forEach(b=>b.addEventListener('click',()=>openVocab(b.dataset.id)));
}
let vdeck=[], vpos=0;
function buildVDeck(){ vdeck=shuffle(VOCAB).sort((a,b)=>mastery('vocab',a.id)-mastery('vocab',b.id)); vpos=0; }
function renderVCard(){
  if(vpos>=vdeck.length) buildVDeck();
  const v=vdeck[vpos];
  vcCount.textContent=`Card ${vpos+1} of ${vdeck.length} · weak ones first`;
  vcStage.innerHTML=`
    <div class="flip" id="vflip" tabindex="0" role="button" aria-label="Flashcard, tap to flip">
      <div class="flip-inner">
        <div class="face front"><span class="tag">word</span><span class="glyph" style="font-size:52px">${v.w}</span><span class="hint">tap to reveal</span></div>
        <div class="face back"><span class="tag">meaning</span><span class="glyph" style="font-size:26px;font-weight:700;text-align:center;padding:0 14px">${v.m}</span><span class="hint">${v.reading} · ${v.r}</span></div>
      </div>
    </div>
    <span class="flip-tip">Did you recall it?</span>
    <div class="card-actions">
      <button class="btn again" id="vAgain">Review again</button>
      <button class="btn good" id="vGood">Got it →</button>
    </div>`;
  const flip=document.getElementById('vflip');
  const doFlip=()=>flip.classList.toggle('flipped');
  flip.addEventListener('click',doFlip);
  flip.addEventListener('keydown',ev=>{ if(ev.key===' '||ev.key==='Enter'){ev.preventDefault();doFlip();} });
  document.getElementById('vGood').onclick=()=>{ record('vocab',v.id,true); vpos++; renderVCard(); renderStats(); };
  document.getElementById('vAgain').onclick=()=>{ record('vocab',v.id,false); vpos++; renderVCard(); renderStats(); };
}

/* =========================================================
   SUB-MODE switching for kanji & vocab
   ========================================================= */
function showKanjiSub(sub){
  state.kanjiSub=sub;
  document.querySelectorAll('#kanjiSub button').forEach(b=>b.classList.toggle('on',b.dataset.sub===sub));
  document.getElementById('kanjiBrowse').classList.toggle('on',sub==='browse');
  document.getElementById('kanjiQuiz').classList.toggle('on',sub==='quiz');
  if(sub==='browse') renderKanji();
  else { kquiz={right:0,total:0,cur:null,dir:'k2m',answered:false}; newKQuiz(); }
}
function showVocabSub(sub){
  state.vocabSub=sub;
  document.querySelectorAll('#vocabSub button').forEach(b=>b.classList.toggle('on',b.dataset.sub===sub));
  document.getElementById('vocabBrowse').classList.toggle('on',sub==='browse');
  document.getElementById('vocabCards').classList.toggle('on',sub==='cards');
  if(sub==='browse') renderVocab();
  else { buildVDeck(); renderVCard(); }
}
document.querySelectorAll('#kanjiSub button').forEach(b=>b.addEventListener('click',()=>showKanjiSub(b.dataset.sub)));
document.querySelectorAll('#vocabSub button').forEach(b=>b.addEventListener('click',()=>showVocabSub(b.dataset.sub)));

:"one","i":"u5:v1"},{"jp":"に","ro":"ni","en":"two","i":"u5:v2"},{"jp":"さん","ro":"san","en":"three","i":"u5:v3"},{"jp":"よん","ro":"yon","en":"four","i":"u5:v4"},{"jp":"ご","ro":"go","en":"five","i":"u5:v5"},{"jp":"ろく","ro":"roku","en":"six","i":"u5:v6"},{"jp":"なな","ro":"nana","en":"seven","i":"u5:v7"},{"jp":"はち","ro":"hachi","en":"eight","i":"u5:v8"},{"jp":"きゅう","ro":"kyū","en":"nine","i":"u5:v9"},{"jp":"じゅう","ro":"jū","en":"ten","i":"u5:v10"},{"jp":"なんさい","ro":"nansai","en":"how old","i":"u5:v11"}],"sents":[{"t":["なんさい","です","か"],"en":"How old are you?","i":"u5:s1","ro":"nansai desu ka"},{"t":["わたし","は","じゅうはっさい","です"],"en":"I am eighteen years old.","i":"u5:s2","ro":"watashi wa jūhassai desu"},{"t":["いち","に","さん"],"en":"One, two, three.","i":"u5:s3","ro":"ichi ni san"},{"t":["せんせい","は","さんじゅっさい","です"],"en":"The teacher is thirty years old.","i":"u5:s4","ro":"sensei wa sanjussai desu"},{"t":["よん","ご","ろく"],"en":"Four, five, six.","i":"u5:s5","ro":"yon go roku"},{"t":["わたし","は","にじゅっさい","です"],"en":"I am twenty years old.","i":"u5:s6","ro":"watashi wa nijussai desu"},{"t":["なな","はち","きゅう","じゅう"],"en":"Seven, eight, nine, ten.","i":"u5:s7","ro":"nana hachi kyū jū"}]},{"id":"u6","title":"Not doing","jp":"ひてい","tip":"Flip ます → <b>ません</b> to say “don’t”: のみます → のみません. For nouns, “is not” = <b>じゃないです</b>: せんせいじゃないです = I’m not a teacher. ぜんぜん + negative = “not at all.”","vocab":[{"jp":"わかります","ro":"wakarimasu","en":"to understand","i":"u6:v1"},{"jp":"わかりません","ro":"wakarimasen","en":"I don't understand","i":"u6:v2"},{"jp":"にく","ro":"niku","en":"meat","i":"u6:v3"},{"jp":"さかな","ro":"sakana","en":"fish","i":"u6:v4"},{"jp":"やさい","ro":"yasai","en":"vegetables","i":"u6:v5"},{"jp":"ぜんぜん","ro":"zenzen","en":"not at all","i":"u6:v6"},{"jp":"ちょっと","ro":"chotto","en":"a little","i":"u6:v7"}],"sents":[{"t":["わたし","は","コーヒー","を","のみません"],"en":"I do not drink coffee.","i":"u6:s1","ro":"watashi wa kōhī o nomimasen"},{"t":["にく","を","たべません"],"en":"I do not eat meat.","i":"u6:s2","ro":"niku o tabemasen"},{"t":["わかります","か"],"en":"Do you understand?","i":"u6:s3","ro":"wakarimasu ka"},{"t":["いいえ","わかりません"],"en":"No, I don't understand.","i":"u6:s4","ro":"iie wakarimasen"},{"t":["ぜんぜん","わかりません"],"en":"I don't understand at all.","i":"u6:s5","ro":"zenzen wakarimasen"},{"t":["わたし","は","せんせい","じゃないです"],"en":"I am not a teacher.","i":"u6:s6","ro":"watashi wa sensei janaidesu"},{"t":["それ","は","さかな","じゃないです"],"en":"That is not fish.","i":"u6:s7","ro":"sore wa sakana janaidesu"},{"t":["ちょっと","わかります"],"en":"I understand a little.","i":"u6:s8","ro":"chotto wakarimasu"}]},{"id":"u7","title":"Going places","jp":"いきます","tip":"<b>に</b> or <b>へ</b> (read <b>e</b>) marks the destination — the arrow’s target: がっこう<b>に</b>いきます. <b>で</b> marks the vehicle or tool: でんしゃ<b>で</b> = by train.","vocab":[{"jp":"いきます","ro":"ikimasu","en":"to go","i":"u7:v1"},{"jp":"きます","ro":"kimasu","en":"to come","i":"u7:v2"},{"jp":"かえります","ro":"kaerimasu","en":"to return home","i":"u7:v3"},{"jp":"うち","ro":"uchi","en":"home, house","i":"u7:v4"},{"jp":"えき","ro":"eki","en":"station","i":"u7:v5"},{"jp":"とうきょう","ro":"Tōkyō","en":"Tokyo","i":"u7:v6"},{"jp":"にほん","ro":"Nihon","en":"Japan","i":"u7:v7"},{"jp":"バス","ro":"basu","en":"bus","i":"u7:v8"},{"jp":"でんしゃ","ro":"densha","en":"train","i":"u7:v9"}],"sents":[{"t":["がっこう","に","いきます"],"en":"I go to school.","i":"u7:s1","ro":"gakkō ni ikimasu"},{"t":["わたし","は","にほん","へ","いきます"],"en":"I go to Japan.","i":"u7:s2","ro":"watashi wa nihon e ikimasu"},{"t":["うち","に","かえります"],"en":"I return home.","i":"u7:s3","ro":"uchi ni kaerimasu"},{"t":["あした","とうきょう","に","いきます"],"en":"Tomorrow I will go to Tokyo.","i":"u7:s4","ro":"ashita tōkyō ni ikimasu"},{"t":["でんしゃ","で","いきます"],"en":"I go by train.","i":"u7:s5","ro":"densha de ikimasu"},{"t":["バス","で","えき","に","いきます"],"en":"I go to the station by bus.","i":"u7:s6","ro":"basu de eki ni ikimasu"},{"t":["ともだち","が","うち","に","きます"],"en":"A friend is coming to my house.","i":"u7:s7","ro":"tomodachi ga uchi ni kimasu"}]},{"id":"u8","title":"There is…","jp":"あります・います","tip":"Two “there is” verbs: <b>います</b> for living, moving things (people, animals); <b>あります</b> for everything else. <b>が</b> marks what exists; the place takes <b>に</b>. うえ = on top, なか = inside: つくえの うえに = on the desk.","vocab":[{"jp":"あります","ro":"arimasu","en":"there is (thing)","i":"u8:v1"},{"jp":"います","ro":"imasu","en":"there is (person/animal)","i":"u8:v2"},{"jp":"ねこ","ro":"neko","en":"cat","i":"u8:v3"},{"jp":"いぬ","ro":"inu","en":"dog","i":"u8:v4"},{"jp":"つくえ","ro":"tsukue","en":"desk","i":"u8:v5"},{"jp":"うえ","ro":"ue","en":"top, above","i":"u8:v6"},{"jp":"なか","ro":"naka","en":"inside","i":"u8:v7"},{"jp":"どこ","ro":"doko","en":"where","i":"u8:v8"},{"jp":"トイレ","ro":"toire","en":"toilet","i":"u8:v9"},{"jp":"ぎんこう","ro":"ginkō","en":"bank","i":"u8:v10"},{"jp":"あそこ","ro":"asoko","en":"over there","i":"u8:v11"}],"sents":[{"t":["ねこ","が","います"],"en":"There is a cat.","i":"u8:s1","ro":"neko ga imasu"},{"t":["つくえ","の","うえ","に","ほん","が","あります"],"en":"There is a book on the desk.","i":"u8:s2","ro":"tsukue no ue ni hon ga arimasu"},{"t":["トイレ","は","どこ","です","か"],"en":"Where is the toilet?","i":"u8:s3","ro":"toire wa doko desu ka"},{"t":["ぎんこう","は","あそこ","です"],"en":"The bank is over there.","i":"u8:s4","ro":"ginkō wa asoko desu"},{"t":["うち","に","いぬ","が","います"],"en":"There is a dog at my house.","i":"u8:s5","ro":"uchi ni inu ga imasu"},{"t":["かばん","の","なか","に","ペン","が","あります"],"en":"There is a pen inside the bag.","i":"u8:s6","ro":"kaban no naka ni pen ga arimasu"},{"t":["がっこう","に","せんせい","が","います"],"en":"There is a teacher at the school.","i":"u8:s7","ro":"gakkō ni sensei ga imasu"}]},{"id":"u9","title":"Describing","jp":"けいようし","tip":"i-adjectives end in <b>い</b> and slot straight in: before a noun (おおきい りんご) or before です. <b>この/その/あの</b> = this/that/that-over-there + noun (same three zones as これ/それ/あれ).","vocab":[{"jp":"おおきい","ro":"ōkii","en":"big","i":"u9:v1"},{"jp":"ちいさい","ro":"chiisai","en":"small","i":"u9:v2"},{"jp":"あたらしい","ro":"atarashii","en":"new","i":"u9:v3"},{"jp":"ふるい","ro":"furui","en":"old (things)","i":"u9:v4"},{"jp":"おいしい","ro":"oishii","en":"delicious","i":"u9:v5"},{"jp":"たかい","ro":"takai","en":"expensive, tall","i":"u9:v6"},{"jp":"むずかしい","ro":"muzukashii","en":"difficult","i":"u9:v7"},{"jp":"たのしい","ro":"tanoshii","en":"fun","i":"u9:v8"},{"jp":"にほんご","ro":"nihongo","en":"Japanese language","i":"u9:v9"}],"sents":[{"t":["この","りんご","は","おおきい","です"],"en":"This apple is big.","i":"u9:s1","ro":"kono ringo wa ōkii desu"},{"t":["その","かばん","は","あたらしい","です"],"en":"That bag is new.","i":"u9:s2","ro":"sono kaban wa atarashii desu"},{"t":["にほんご","は","むずかしい","です"],"en":"Japanese is difficult.","i":"u9:s3","ro":"nihongo wa muzukashii desu"},{"t":["この","すし","は","おいしい","です"],"en":"This sushi is delicious.","i":"u9:s4","ro":"kono sushi wa oishii desu"},{"t":["あの","でんわ","は","たかい","です"],"en":"That phone is expensive.","i":"u9:s5","ro":"ano denwa wa takai desu"},{"t":["わたし","の","うち","は","ちいさい","です"],"en":"My house is small.","i":"u9:s6","ro":"watashi no uchi wa chiisai desu"},{"t":["この","ほん","は","ふるい","です"],"en":"This book is old.","i":"u9:s7","ro":"kono hon wa furui desu"},{"t":["にほんご","は","たのしい","です"],"en":"Japanese is fun.","i":"u9:s8","ro":"nihongo wa tanoshii desu"}]},{"id":"u10","title":"Likes","jp":"すきです","tip":"Likes use <b>が</b>, not を: ねこ<b>が</b>すきです — literally “cats are liked (by me).” だいすき = love; きらい = dislike.","vocab":[{"jp":"すき","ro":"suki","en":"liked, like","i":"u10:v1"},{"jp":"だいすき","ro":"daisuki","en":"loved, love","i":"u10:v2"},{"jp":"きらい","ro":"kirai","en":"disliked, dislike","i":"u10:v3"},{"jp":"スポーツ","ro":"supōtsu","en":"sports","i":"u10:v4"},{"jp":"おんがく","ro":"ongaku","en":"music","i":"u10:v5"},{"jp":"えいが","ro":"eiga","en":"movie","i":"u10:v6"},{"jp":"アニメ","ro":"anime","en":"anime","i":"u10:v7"}],"sents":[{"t":["わたし","は","ねこ","が","すき","です"],"en":"I like cats.","i":"u10:s1","ro":"watashi wa neko ga suki desu"},{"t":["すし","が","だいすき","です"],"en":"I love sushi.","i":"u10:s2","ro":"sushi ga daisuki desu"},{"t":["スポーツ","が","すき","です","か"],"en":"Do you like sports?","i":"u10:s3","ro":"supōtsu ga suki desu ka"},{"t":["おんがく","が","すき","です"],"en":"I like music.","i":"u10:s4","ro":"ongaku ga suki desu"},{"t":["えいが","が","だいすき","です"],"en":"I love movies.","i":"u10:s5","ro":"eiga ga daisuki desu"},{"t":["わたし","は","にく","が","きらい","です"],"en":"I dislike meat.","i":"u10:s6","ro":"watashi wa niku ga kirai desu"},{"t":["アニメ","が","すき","です"],"en":"I like anime.","i":"u10:s7","ro":"anime ga suki desu"}]},{"id":"u11","title":"Time","jp":"じかん","tip":"Number + <b>じ</b> = o’clock (さんじ = 3:00). <b>はん</b> = half past. ごぜん = a.m., ごご = p.m. A time takes <b>に</b> for “at”: ろくじ<b>に</b>たべます. Watch out: 7 o’clock is <b>しちじ</b>.","vocab":[{"jp":"いま","ro":"ima","en":"now","i":"u11:v1"},{"jp":"なんじ","ro":"nanji","en":"what time","i":"u11:v2"},{"jp":"はん","ro":"han","en":"half past","i":"u11:v3"},{"jp":"ごぜん","ro":"gozen","en":"a.m.","i":"u11:v4"},{"jp":"ごご","ro":"gogo","en":"p.m.","i":"u11:v5"},{"jp":"あさ","ro":"asa","en":"morning","i":"u11:v6"},{"jp":"よる","ro":"yoru","en":"night","i":"u11:v7"}],"sents":[{"t":["いま","なんじ","です","か"],"en":"What time is it now?","i":"u11:s1","ro":"ima nanji desu ka"},{"t":["いま","さんじ","です"],"en":"It is three o'clock.","i":"u11:s2","ro":"ima sanji desu"},{"t":["くじはん","です"],"en":"It is half past nine.","i":"u11:s3","ro":"kujihan desu"},{"t":["ごぜん","しちじ","です"],"en":"It is 7 a.m.","i":"u11:s4","ro":"gozen shichiji desu"},{"t":["ごご","ろくじ","に","ごはん","を","たべます"],"en":"I eat a meal at 6 p.m.","i":"u11:s5","ro":"gogo rokuji ni gohan o tabemasu"},{"t":["あさ","コーヒー","を","のみます"],"en":"I drink coffee in the morning.","i":"u11:s6","ro":"asa kōhī o nomimasu"},{"t":["よる","おちゃ","を","のみます"],"en":"I drink tea at night.","i":"u11:s7","ro":"yoru ocha o nomimasu"}]},{"id":"u12","title":"Days of the week","jp":"ようび","tip":"Every day ends in <b>ようび</b>: げつ(Moon)・か(fire)・すい(water)・もく(wood)・きん(gold)・ど(earth)・にち(Sun) + ようび. Ask with なんようび. A day takes <b>に</b> for “on.”","voca
